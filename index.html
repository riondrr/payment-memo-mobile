    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      navigator.serviceWorker.register("sw.js").catch(error => console.warn(error));
    }

    function loadState(key = storageKey) {
      return readStoredState(key) || normalizeState(structuredClone(seed));
    }

    function readStoredState(key) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return null;
        const saved = JSON.parse(raw);
        if (saved && Array.isArray(saved.months)) return normalizeState(saved);
      } catch (error) {
        console.warn(error);
      }
      return null;
    }

    function persist(options = {}) {
      state.trash = normalizeTrash(state.trash);
      state.sortOrder = normalizeSortOrder(state.sortOrder, state.months, state.trash);
      if (!options.keepUpdatedAt) {
        state.updatedAt = new Date().toISOString();
      }
      localStorage.setItem(activeStorageKey, JSON.stringify(state));
      activeStateSource = currentSession ? "user" : "anonymous";
      if (options.sync !== false) {
        scheduleCloudSync();
      }
    }

    function normalizeState(value) {
      const normalized = value && typeof value === "object" ? value : structuredClone(seed);
      normalized.months = Array.isArray(normalized.months) && normalized.months.length
        ? normalized.months.map(normalizeMonth)
        : structuredClone(seed.months).map(normalizeMonth);
      normalized.trash = normalizeTrash(normalized.trash);
      normalized.sortOrder = normalizeSortOrder(normalized.sortOrder, normalized.months, normalized.trash);
      normalized.activeMonth = normalized.months.some(month => month.id === normalized.activeMonth)
        ? normalized.activeMonth
        : normalized.months[0]?.id || seed.activeMonth;
      normalized.updatedAt = normalized.updatedAt || new Date().toISOString();
      normalized.schemaVersion = 9;
      return normalized;
    }

    function normalizeTrash(value) {
      const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
      return (Array.isArray(value) ? value : [])
        .filter(entry => entry && new Date(entry.deletedAt).getTime() >= cutoff)
        .map(entry => ({
          id: String(entry.id || crypto.randomUUID()),
          deletedAt: entry.deletedAt,
          monthId: String(entry.monthId || ""),
          monthLabel: String(entry.monthLabel || formatMonthLabel(entry.monthId)),
          item: normalizeItem(entry.item, entry.monthId)
        }));
    }

    function normalizeMonth(month) {
      const id = month?.id || seed.activeMonth;
      const items = Array.isArray(month?.items) ? month.items.map(item => normalizeItem(item, id)) : [];
      return {
        id,
        label: month?.label || formatMonthLabel(id),
        items: dedupeMonthItems(items)
      };
    }

    function dedupeMonthItems(items) {
      const bySeries = new Map();
      items.forEach(item => {
        const seriesId = String(item.seriesId || item.id);
        if (!bySeries.has(seriesId)) {
          bySeries.set(seriesId, item);
          return;
        }
        mergeDuplicateItem(bySeries.get(seriesId), item);
      });
      return Array.from(bySeries.values());
    }

    function mergeDuplicateItem(target, duplicate) {
      [
        "debitAccount", "paymentMethod", "content", "amount", "usedDate", "debitDate",
        "debitDay", "billingStartMonth", "usagePeriodStart", "usagePeriodEnd", "paidDate", "note"
      ].forEach(field => {
        if ((target[field] === "" || target[field] === null || target[field] === undefined) &&
            duplicate[field] !== "" && duplicate[field] !== null && duplicate[field] !== undefined) {
          target[field] = duplicate[field];
        }
      });
      target.paid = Boolean(target.paid || duplicate.paid);
      return target;
    }

    function normalizeSortOrder(value, months, trash = []) {
      const knownAccounts = [];
      const knownSeries = [];
      months.forEach(month => month.items.forEach(item => {
        pushUnique(knownAccounts, item.debitAccount || unassignedAccount);
        pushUnique(knownSeries, item.seriesId || item.id);
      }));
      trash.forEach(entry => {
        pushUnique(knownAccounts, entry.item.debitAccount || unassignedAccount);
        pushUnique(knownSeries, entry.item.seriesId || entry.item.id);
      });
      return {
        accounts: normalizeOrderList(value?.accounts, knownAccounts),
        series: normalizeOrderList(value?.series, knownSeries)
      };
    }

    function normalizeOrderList(value, knownValues) {
      const known = new Set(knownValues.map(String));
      const result = [];
      (Array.isArray(value) ? value : []).forEach(entry => {
        const key = String(entry);
        if (known.has(key)) pushUnique(result, key);
      });
      knownValues.forEach(entry => pushUnique(result, String(entry)));
      return result;
    }

    function pushUnique(values, entry) {
      if (!values.includes(entry)) values.push(entry);
    }

    function normalizeItem(item, monthId = seed.activeMonth) {
      const id = item?.id || crypto.randomUUID();
      const paymentType = normalizePaymentType(item?.paymentType);
      const billingCycleMonths = normalizeBillingCycleMonths(item?.billingCycleMonths);
      const billingStartMonth = normalizeBillingStartMonth(item?.billingStartMonth, monthId);
      const debitDate = normalizeDebitDate(item, monthId);
      const debitDay = dayFromDate(debitDate) || normalizeDebitDay(item?.debitDay);
      const usedDate = normalizeDateValue(item?.usedDate);
      const usagePeriodStart = normalizeDateValue(item?.usagePeriodStart);
      const usagePeriodEnd = normalizeDateValue(item?.usagePeriodEnd);
      const paidDate = normalizeDateValue(item?.paidDate);
      const hasAccountModel = "debitAccount" in Object(item) ||
        "paymentType" in Object(item) ||
        "paymentMethod" in Object(item);

      if (hasAccountModel) {
        return {
          id,
          seriesId: String(item.seriesId || id),
          debitAccount: String(item.debitAccount || unassignedAccount).trim() || unassignedAccount,
          paymentType,
          paymentMethod: paymentType === "card"
            ? String(item.paymentMethod || item.method || "").trim()
            : "",
          content: String(item.content || "").trim(),
          amount: normalizeAmountValue(item.amount),
          usedDate,
          debitDate,
          debitDay,
          billingCycleMonths,
          billingStartMonth,
          usagePeriodStart,
          usagePeriodEnd,
          paidDate,
          note: String(item.note || "").trim(),
          paid: Boolean(item.paid)
        };
      }

      const legacyMethod = String(item?.method || "").trim();
      const legacyIsCard = isLikelyCardMethod(legacyMethod);
      return {
        id,
        seriesId: String(item?.seriesId || id),
        debitAccount: legacyIsCard ? unassignedAccount : legacyMethod || unassignedAccount,
        paymentType: legacyIsCard ? "card" : "direct",
        paymentMethod: legacyIsCard ? legacyMethod : "",
        content: String(item?.content || "").trim(),
        amount: normalizeAmountValue(item?.amount),
        usedDate,
        debitDate,
        debitDay,
        billingCycleMonths,
        billingStartMonth,
        usagePeriodStart,
        usagePeriodEnd,
        paidDate,
        note: String(item?.note || "").trim(),
        paid: Boolean(item?.paid)
      };
    }

    function normalizePaymentType(value) {
      return value === "card" ? "card" : "direct";
    }

    function normalizeDebitDay(value) {
      if (value === null || value === undefined || value === "") return null;
      const number = Number(value);
      return Number.isInteger(number) && number >= 1 && number <= 31 ? number : null;
    }

    function normalizeDateValue(value) {
      const candidate = String(value || "").trim();
      const match = /^(\d{4})-(\d{2})-(\d{2})$/.exec(candidate);
      if (!match) return "";
      const year = Number(match[1]);
      const month = Number(match[2]);
      const day = Number(match[3]);
      const date = new Date(Date.UTC(year, month - 1, day));
      const isValid = date.getUTCFullYear() === year &&
        date.getUTCMonth() === month - 1 &&
        date.getUTCDate() === day;
      return isValid ? candidate : "";
    }

    function dayFromDate(value) {
      const date = normalizeDateValue(value);
      return date ? Number(date.slice(8, 10)) : null;
    }

    function dateFromMonthAndDay(monthId, value) {
      const day = normalizeDebitDay(value);
      const match = /^(\d{4})-(\d{2})$/.exec(String(monthId || ""));
      if (!day || !match) return "";
      const year = Number(match[1]);
      const month = Number(match[2]);
      const lastDay = new Date(year, month, 0).getDate();
      return `${year}-${String(month).padStart(2, "0")}-${String(Math.min(day, lastDay)).padStart(2, "0")}`;
    }

    function normalizeDebitDate(item, monthId) {
      const debitDate = normalizeDateValue(item?.debitDate);
      if (debitDate) return debitDate;
      return dateFromMonthAndDay(monthId, item?.debitDay);
    }

    function normalizeBillingCycleMonths(value) {
      const number = Number(value);
      return Number.isInteger(number) && number >= 1 && number <= 120 ? number : 1;
    }

    function isValidBillingCycleMonths(value) {
      const number = Number(value);
      return Number.isInteger(number) && number >= 1 && number <= 120;
    }

    function normalizeBillingStartMonth(value, fallback = seed.activeMonth) {
      const candidate = String(value || fallback || seed.activeMonth);
      return /^\d{4}-\d{2}$/.test(candidate) ? candidate : seed.activeMonth;
    }

    function billingCycleLabel(value) {
      const cycle = normalizeBillingCycleMonths(value);
      return cycle === 1 ? "毎月" : `${cycle}ヶ月ごと`;
    }

    function formatDateLabel(value) {
      const date = normalizeDateValue(value);
      if (!date) return "";
      const [year, month, day] = date.split("-");
      return `${Number(year)}/${Number(month)}/${Number(day)}`;
    }

    function formatMonthDayLabel(value) {
      const date = normalizeDateValue(value);
      if (!date) return "";
      const [, month, day] = date.split("-");
      return `${month}/${day}`;
    }

    function formatDebitDayLabel(value) {
      const day = dayFromDate(value) || normalizeDebitDay(value);
      return day ? String(day).padStart(2, "0") : "";
    }

    function dateYear(value) {
      const date = normalizeDateValue(value);
      return date ? Number(date.slice(0, 4)) : null;
    }

    function monthIdYear(monthId) {
      const match = /^(\d{4})-\d{2}$/.exec(String(monthId || ""));
      if (match) return Number(match[1]);
      const seedMatch = /^(\d{4})-\d{2}$/.exec(String(seed.activeMonth || ""));
      return seedMatch ? Number(seedMatch[1]) : new Date().getFullYear();
    }

    function monthDayParts(value) {
      const date = normalizeDateValue(value);
      if (!date) return null;
      return {
        month: Number(date.slice(5, 7)),
        day: Number(date.slice(8, 10))
      };
    }

    function monthDayRank(parts) {
      return parts.month * 100 + parts.day;
    }

    function parseMonthDayInput(value) {
      const text = String(value || "").trim();
      if (!text) return { empty: true };
      const date = normalizeDateValue(text);
      if (date) {
        return {
          date,
          month: Number(date.slice(5, 7)),
          day: Number(date.slice(8, 10))
        };
      }
      const compact = /^(\d{2})(\d{2})$/.exec(text);
      const match = compact || /^(\d{1,2})[\/.-](\d{1,2})$/.exec(text);
      if (!match) return null;
      const month = Number(match[1]);
      const day = Number(match[2]);
      if (!Number.isInteger(month) || !Number.isInteger(day) || month < 1 || month > 12 || day < 1 || day > 31) {
        return null;
      }
      return { month, day };
    }

    function dateFromParts(year, month, day) {
      const date = new Date(Date.UTC(year, month - 1, day));
      const isValid = date.getUTCFullYear() === year &&
        date.getUTCMonth() === month - 1 &&
        date.getUTCDate() === day;
      if (!isValid) return "";
      return [
        date.getUTCFullYear(),
        String(date.getUTCMonth() + 1).padStart(2, "0"),
        String(date.getUTCDate()).padStart(2, "0")
      ].join("-");
    }

    function usagePeriodDateFromMonthDay(value, item, field, monthId) {
      const parsed = parseMonthDayInput(value);
      if (!parsed) return null;
      if (parsed.empty) return "";
      if (parsed.date) return parsed.date;

      const otherField = field === "usagePeriodEnd" ? "usagePeriodStart" : "usagePeriodEnd";
      const otherParts = monthDayParts(item?.[otherField]);
      let year = dateYear(item?.[field]) || monthIdYear(monthId);

      if (otherParts && field === "usagePeriodEnd") {
        const startYear = dateYear(item?.usagePeriodStart) || year;
        year = monthDayRank(parsed) < monthDayRank(otherParts) ? startYear + 1 : startYear;
      } else if (otherParts && field === "usagePeriodStart") {
        const endYear = dateYear(item?.usagePeriodEnd) || year;
        year = monthDayRank(parsed) > monthDayRank(otherParts) ? endYear - 1 : endYear;
      }

      return dateFromParts(year, parsed.month, parsed.day) || null;
    }

    function usagePeriodLabel(item) {
      const start = formatDateLabel(item.usagePeriodStart);
      const end = formatDateLabel(item.usagePeriodEnd);
      if (start && end) return `${start}〜${end}`;
      if (start) return `${start}〜`;
      if (end) return `〜${end}`;
      return "";
    }

    function addDaysToDate(value, days) {
      const date = normalizeDateValue(value);
      if (!date) return "";
      const [year, month, day] = date.split("-").map(Number);
      const next = new Date(Date.UTC(year, month - 1, day));
      next.setUTCDate(next.getUTCDate() + days);
      return [
        next.getUTCFullYear(),
        String(next.getUTCMonth() + 1).padStart(2, "0"),
        String(next.getUTCDate()).padStart(2, "0")
      ].join("-");
    }

    function previousUsagePeriodEnd(item, monthId) {
      return normalizeDateValue(previousSeriesItem(item, monthId)?.usagePeriodEnd);
    }

    function previousSeriesItem(item, monthId) {
      const seriesId = String(item?.seriesId || "").trim();
      if (!seriesId) return null;
      const targetIndex = monthIndex(monthId);
      const previousMonths = state.months
        .slice()
        .filter(month => monthIndex(month.id) < targetIndex)
        .sort((a, b) => b.id.localeCompare(a.id));

      for (const month of previousMonths) {
        const previousItem = month.items.find(entry => String(entry.seriesId || "") === seriesId);
        if (previousItem) return previousItem;
      }
      return null;
    }

    function previousDebitDate(item, monthId) {
      const previous = previousSeriesItem(item, monthId);
      const day = dayFromDate(previous?.debitDate) || normalizeDebitDay(previous?.debitDay);
      return day ? dateFromMonthAndDay(monthId, day) : "";
    }

    function previousUsagePeriodStart(item, monthId) {
      return addDaysToDate(previousUsagePeriodEnd(item, monthId), 1);
    }

    function addMonthsToDateClamped(value, months) {
      const date = normalizeDateValue(value);
      if (!date) return "";
      const [year, month, day] = date.split("-").map(Number);
      const targetFirst = new Date(Date.UTC(year, month - 1 + Number(months || 0), 1));
      const targetYear = targetFirst.getUTCFullYear();
      const targetMonth = targetFirst.getUTCMonth() + 1;
      const lastDay = new Date(Date.UTC(targetYear, targetMonth, 0)).getUTCDate();
      return dateFromParts(targetYear, targetMonth, Math.min(day, lastDay));
    }

    function previousUsagePeriodRange(item, monthId) {
      const start = previousUsagePeriodStart(item, monthId);
      if (!start) return null;
      return {
        start,
        end: addMonthsToDateClamped(start, 1)
      };
    }

    function isLikelyCardMethod(value) {
      return /カード|card/i.test(String(value || ""));
    }

    function formatMonthLabel(id) {
      const [year, month] = String(id).split("-");
      return year && month ? `${Number(year)}年${Number(month)}月` : "年月未設定";
    }

    function monthIndex(id) {
      const [year, month] = String(id).split("-").map(Number);
      return year * 12 + month - 1;
    }

    function offsetMonthId(monthId, offset) {
      const [year, month] = String(monthId).split("-").map(Number);
      const date = new Date(Date.UTC(year, month - 1 + offset, 1));
      return `${date.getUTCFullYear()}-${String(date.getUTCMonth() + 1).padStart(2, "0")}`;
    }

    function fullMonthRange(monthId) {
      if (!/^\d{4}-\d{2}$/.test(String(monthId || ""))) return null;
      const [year, month] = monthId.split("-").map(Number);
      const lastDay = new Date(Date.UTC(year, month, 0)).getUTCDate();
      return {
        start: `${monthId}-01`,
        end: `${monthId}-${String(lastDay).padStart(2, "0")}`
      };
    }

    function fullCycleRange(monthId, cycleValue) {
      const cycle = normalizeBillingCycleMonths(cycleValue);
      const endMonthId = offsetMonthId(monthId, -1);
      const endRange = fullMonthRange(endMonthId);
      if (!endRange) return null;
      return {
        start: `${offsetMonthId(monthId, -cycle)}-01`,
        end: endRange.end
      };
    }

    function isBillingDueInMonth(item, monthId) {
      const cycle = normalizeBillingCycleMonths(item.billingCycleMonths);
      if (cycle === 1) return true;
      const startMonth = normalizeBillingStartMonth(item.billingStartMonth, monthId);
      const diff = monthIndex(monthId) - monthIndex(startMonth);
      return diff >= 0 && diff % cycle === 0;
    }

    function copyItemForMonth(item, targetMonthId, sourceMonthId = "") {
      const cycle = normalizeBillingCycleMonths(item.billingCycleMonths);
      const debitDay = dayFromDate(item.debitDate) || normalizeDebitDay(item.debitDay);
      const sourceFullRange = sourceMonthId ? fullCycleRange(sourceMonthId, cycle) : null;
      const targetFullRange = fullCycleRange(targetMonthId, cycle);
      const usedFullRange = sourceFullRange &&
        item.usagePeriodStart === sourceFullRange.start && item.usagePeriodEnd === sourceFullRange.end;
      return {
        id: crypto.randomUUID(),
        seriesId: item.seriesId || item.id || crypto.randomUUID(),
        debitAccount: item.debitAccount || unassignedAccount,
        paymentType: normalizePaymentType(item.paymentType),
        paymentMethod: normalizePaymentType(item.paymentType) === "card" ? item.paymentMethod : "",
        content: item.content,
        amount: "",
        usedDate: "",
        debitDate: dateFromMonthAndDay(targetMonthId, debitDay),
        debitDay,
        billingCycleMonths: cycle,
        billingStartMonth: normalizeBillingStartMonth(item.billingStartMonth, targetMonthId),
        usagePeriodStart: usedFullRange ? targetFullRange.start : addDaysToDate(item.usagePeriodEnd, 1),
        usagePeriodEnd: usedFullRange ? targetFullRange.end : "",
        paidDate: "",
        note: "",
        paid: false
      };
    }

    function itemsForNewMonth(targetMonthId) {
      const latestBySeries = new Map();
      state.months
        .filter(month => monthIndex(month.id) < monthIndex(targetMonthId))
        .sort((a, b) => a.id.localeCompare(b.id))
        .forEach(month => {
          month.items.forEach(item => {
            const normalized = normalizeItem(item, month.id);
            latestBySeries.set(normalized.seriesId, { item: normalized, sourceMonthId: month.id });
          });
        });

      const signatures = new Set();
      return Array.from(latestBySeries.values())
        .filter(entry => isBillingDueInMonth(entry.item, targetMonthId))
        .filter(entry => {
          const signature = automaticCopySignature(entry.item);
          if (signatures.has(signature)) return false;
          signatures.add(signature);
          return true;
        })
        .map(entry => copyItemForMonth(entry.item, targetMonthId, entry.sourceMonthId));
    }

    function itemsForPreviousMonth(targetMonthId, sourceMonth) {
      const signatures = new Set();
      const latestBySeries = new Map();
      state.months.slice().sort((a, b) => a.id.localeCompare(b.id)).forEach(month => {
        month.items.forEach(item => {
          const normalized = normalizeItem(item, month.id);
          latestBySeries.set(normalized.seriesId, normalized);
        });
      });
      return Array.from(latestBySeries.values())
        .filter(item => {
          const cycle = normalizeBillingCycleMonths(item.billingCycleMonths);
          const startMonth = normalizeBillingStartMonth(item.billingStartMonth, sourceMonth.id);
          return (monthIndex(targetMonthId) - monthIndex(startMonth)) % cycle === 0;
        })
        .filter(item => {
          const signature = automaticCopySignature(item);
          if (signatures.has(signature)) return false;
          signatures.add(signature);
          return true;
        })
        .map(item => {
          const copied = copyItemForMonth(item, targetMonthId);
          copied.usagePeriodStart = "";
          copied.usagePeriodEnd = "";
          copied.paidDate = "";
          return copied;
        });
    }

    function automaticCopySignature(item) {
      return JSON.stringify([
        String(item.debitAccount || unassignedAccount).trim(),
        normalizePaymentType(item.paymentType),
        String(item.paymentMethod || "").trim(),
        String(item.content || "").trim(),
        normalizeBillingCycleMonths(item.billingCycleMonths)
      ]);
    }

    function replaceState(nextState, updatedAt) {
      const normalized = normalizeState(structuredClone(nextState));
      normalized.updatedAt = updatedAt || normalized.updatedAt;
      Object.keys(state).forEach(key => delete state[key]);
      Object.assign(state, normalized);
      localStorage.setItem(activeStorageKey, JSON.stringify(state));
    }

    function storageKeyForUser(user) {
      return `${storageKey}:user:${user.id}`;
    }

    function switchToUserStorage(user) {
      const userStorageKey = storageKeyForUser(user);
      if (activeStorageKey === userStorageKey) return;

      activeStorageKey = userStorageKey;
      const saved = readStoredState(userStorageKey);
      if (saved) {
        activeStateSource = "user";
        replaceState(saved, saved.updatedAt);
        return;
      }

      activeStateSource = "seed";
      replaceState(structuredClone(seed));
    }

    function switchToAnonymousStorage() {
      activeStorageKey = storageKey;
      activeStateSource = "anonymous";
      replaceState(readStoredState(storageKey) || structuredClone(seed));
    }

    function currentMonth() {
      return state.months.find(month => month.id === state.activeMonth) || state.months[0];
    }

    function render() {
      state.trash = normalizeTrash(state.trash);
      state.sortOrder = normalizeSortOrder(state.sortOrder, state.months, state.trash);
      renderTabs();
      renderAccountSuggestions();
      renderMonthlyTable();
      renderEntries();
      renderView();
      renderCalendar();
      trashButton.textContent = state.trash.length ? `最近削除 (${state.trash.length})` : "最近削除";
      renderSummary();
    }

    function setActiveView(view) {
      activeView = view === "calendar" ? "calendar" : "list";
      reorderMode = false;
      render();
    }

    function renderView() {
      const isCalendar = activeView === "calendar";
      listView.hidden = isCalendar;
      calendarView.hidden = !isCalendar;
      listViewButton.classList.toggle("active", !isCalendar);
      calendarViewButton.classList.toggle("active", isCalendar);
      listViewButton.setAttribute("aria-selected", String(!isCalendar));
      calendarViewButton.setAttribute("aria-selected", String(isCalendar));
      reorderButton.disabled = isCalendar || Boolean(searchInput.value.trim());
    }

    function calendarEvents(monthId) {
      const eventsByDate = new Map();
      const addEvent = (date, sourceMonth, item) => {
        if (!date || !date.startsWith(`${monthId}-`)) return;
        if (!eventsByDate.has(date)) eventsByDate.set(date, []);
        eventsByDate.get(date).push({ sourceMonth, item });
      };
      state.months.forEach(sourceMonth => sourceMonth.items.forEach(item => {
        addEvent(normalizeDateValue(item.debitDate), sourceMonth, item);
      }));
      return eventsByDate;
    }

    function renderCalendar() {
      const monthId = currentMonth().id;
      const [year, month] = monthId.split("-").map(Number);
      const firstWeekday = new Date(Date.UTC(year, month - 1, 1)).getUTCDay();
      const lastDay = new Date(Date.UTC(year, month, 0)).getUTCDate();
      const today = localDateValue(new Date());
      const events = calendarEvents(monthId);
      calendarView.innerHTML = `
        <div class="calendar-weekdays" aria-hidden="true">
          ${["日", "月", "火", "水", "木", "金", "土"].map(day => `<span>${day}</span>`).join("")}
        </div>
        <div class="calendar-grid"></div>`;
      const grid = calendarView.querySelector(".calendar-grid");
      for (let index = 0; index < firstWeekday; index += 1) {
        const blank = document.createElement("div");
        blank.className = "calendar-day outside";
        grid.appendChild(blank);
      }
      for (let day = 1; day <= lastDay; day += 1) {
        const date = `${monthId}-${String(day).padStart(2, "0")}`;
        const dayEvents = events.get(date) || [];
        const button = document.createElement("button");
        button.type = "button";
        button.className = `calendar-day${date === today ? " today" : ""}`;
        button.setAttribute("aria-label", `${formatDateLabel(date)} ${dayEvents.length}件`);
        const eventMarkup = dayEvents.slice(0, 3).map(event => {
          const eventClass = event.item.paid ? "paid" : "planned";
          const suffix = event.item.paid ? " 支払い済み" : " 予定";
          return `<span class="calendar-event ${eventClass}">${escapeHtml(event.item.content || "明細")}${suffix}</span>`;
        }).join("");
        button.innerHTML = `<span class="calendar-date-number">${day}</span>${eventMarkup}${dayEvents.length > 3 ? `<span class="calendar-event">ほか${dayEvents.length - 3}件</span>` : ""}`;
        button.addEventListener("click", () => openDaySheet(date));
        grid.appendChild(button);
      }
    }

    function localDateValue(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function openDaySheet(date) {
      daySheet.dataset.date = date;
      daySheetTitle.textContent = `${formatDateLabel(date)}の支払い`;
      renderDayDetails(date);
      daySheet.classList.add("open");
      scrim.classList.add("open");
      daySheet.setAttribute("aria-hidden", "false");
      daySheet.scrollTop = 0;
    }

    function closeDaySheet() {
      daySheet.classList.remove("open");
      scrim.classList.remove("open");
      daySheet.setAttribute("aria-hidden", "true");
      delete daySheet.dataset.date;
    }

    function renderDayDetails(date) {
      const events = calendarEvents(date.slice(0, 7)).get(date) || [];
      dayDetailList.innerHTML = "";
      if (!events.length) {
        dayDetailList.innerHTML = '<div class="empty">この日の引落予定はありません</div>';
        return;
      }
      events.forEach(event => {
        const element = document.createElement("div");
        element.className = "day-detail-item";
        element.innerHTML = `
          <strong>${escapeHtml(event.item.content || "内容未設定")}</strong>
          <span>${escapeHtml(event.sourceMonth.label)}・${escapeHtml(event.item.debitAccount || unassignedAccount)}</span>
          <span>${event.item.paid ? "支払い済み" : "引落予定"}</span>
          <button class="secondary" type="button" data-day-action="paid">${event.item.paid ? "未払いに戻す" : "支払い済みにする"}</button>`;
        element.querySelector('[data-day-action="paid"]').addEventListener("click", () => {
          event.item.paid = !event.item.paid;
          persist();
          render();
          renderDayDetails(date);
        });
        dayDetailList.appendChild(element);
      });
    }

    function toggleReorderMode() {
      if (searchInput.value.trim()) return;
      reorderMode = !reorderMode;
      renderEntries();
    }

    function bindDragHandle(handle, kind, key, account, container) {
      handle.title = "ドラッグして並び替え（キーボードは上下矢印）";
      handle.addEventListener("pointerdown", event => {
        if (!reorderMode || event.button !== 0) return;
        event.preventDefault();
        dragState = { kind, key: String(key), account, container, target: null };
        container.classList.add("dragging");
        handle.setPointerCapture(event.pointerId);
      });
      handle.addEventListener("pointermove", event => {
        if (!dragState || dragState.container !== container) return;
        event.preventDefault();
        updateDragTarget(event.clientX, event.clientY);
      });
      handle.addEventListener("pointerup", event => finishDrag(event.clientY));
      handle.addEventListener("pointercancel", cancelDrag);
      handle.addEventListener("keydown", event => {
        if (!reorderMode || !["ArrowUp", "ArrowDown"].includes(event.key)) return;
        event.preventDefault();
        const candidates = kind === "account"
          ? Array.from(list.querySelectorAll(".account-group"))
          : Array.from(container.closest(".account-group").querySelectorAll(".entry"));
        const currentIndex = candidates.indexOf(container);
        const direction = event.key === "ArrowUp" ? -1 : 1;
        const target = candidates[currentIndex + direction];
        if (!target) return;
        const targetKey = kind === "account" ? target.dataset.account : target.dataset.seriesId;
        const order = kind === "account" ? state.sortOrder.accounts : state.sortOrder.series;
        moveOrderValue(order, String(key), targetKey, direction > 0);
        persist();
        render();
      });
    }

    function updateDragTarget(clientX, clientY) {
      if (!dragState) return;
      const selector = dragState.kind === "account" ? ".account-group" : ".entry";
      const candidate = document.elementFromPoint(clientX, clientY)?.closest(selector);
      const validCandidate = candidate && candidate !== dragState.container &&
        (dragState.kind === "account" || candidate.dataset.account === dragState.account)
        ? candidate
        : null;
      if (dragState.target === validCandidate) return;
      dragState.target?.classList.remove("drop-target");
      dragState.target = validCandidate;
      dragState.target?.classList.add("drop-target");
    }

    function finishDrag(clientY) {
      if (!dragState) return;
      const { kind, key, target, container } = dragState;
      if (target) {
        const targetKey = kind === "account" ? target.dataset.account : target.dataset.seriesId;
        const after = clientY > target.getBoundingClientRect().top + target.getBoundingClientRect().height / 2;
        const order = kind === "account" ? state.sortOrder.accounts : state.sortOrder.series;
        moveOrderValue(order, key, targetKey, after);
        persist();
      }
      target?.classList.remove("drop-target");
      container.classList.remove("dragging");
      dragState = null;
      render();
    }

    function cancelDrag() {
      if (!dragState) return;
      dragState.target?.classList.remove("drop-target");
      dragState.container.classList.remove("dragging");
      dragState = null;
    }

    function moveOrderValue(order, source, target, after) {
      if (source === target) return;
      const sourceIndex = order.indexOf(source);
      if (sourceIndex < 0) return;
      order.splice(sourceIndex, 1);
      const targetIndex = order.indexOf(target);
      if (targetIndex < 0) {
        order.push(source);
        return;
      }
      order.splice(targetIndex + (after ? 1 : 0), 0, source);
    }

    function toggleMonthlyTable() {
      const monthId = currentMonth().id;
      if (expandedMonthlyTables.has(monthId)) {
        expandedMonthlyTables.delete(monthId);
      } else {
        expandedMonthlyTables.add(monthId);
      }
      renderMonthlyTable();
    }

    function renderMonthlyTable() {
      const month = currentMonth();
      const isExpanded = expandedMonthlyTables.has(month.id);
      monthlyTableToggle.setAttribute("aria-expanded", String(isExpanded));
      monthlyTableWrap.hidden = !isExpanded;
      if (!isExpanded) {
        monthlyTableWrap.replaceChildren();
        return;
      }

      const total = month.items.reduce((sum, item) => sum + toNumber(item.amount), 0);
      const sortedItems = orderedItems(month.items);
      const rows = sortedItems.length
        ? sortedItems.map(item => `
            <tr>
              <td>${escapeHtml(item.content || "内容未設定")}</td>
              <td>${formatAmount(item.amount)}</td>
            </tr>
          `).join("")
        : `<tr><td colspan="2">明細がありません</td></tr>`;
      monthlyTableWrap.innerHTML = `
        <table class="monthly-table">
          <thead><tr><th>内容</th><th>金額</th></tr></thead>
          <tbody>${rows}</tbody>
          <tfoot><tr><td>合計</td><td>${formatAmount(total)}</td></tr></tfoot>
        </table>
      `;
    }

    function renderTabs() {
      tabs.innerHTML = "";
      const sortedMonths = state.months.slice().sort((a, b) => a.id.localeCompare(b.id));
      const activeIndex = sortedMonths.findIndex(month => month.id === state.activeMonth);
      const previousButton = document.createElement("button");
      previousButton.type = "button";
      const isOldestMonth = activeIndex === 0;
      previousButton.textContent = isOldestMonth ? "前月を追加" : "‹";
      previousButton.title = isOldestMonth ? "前月を追加" : "前の月";
      previousButton.setAttribute("aria-label", isOldestMonth ? "前月を追加" : "前の月");
      previousButton.disabled = activeIndex < 0;

      const monthSelect = document.createElement("select");
      monthSelect.setAttribute("aria-label", "表示する年月");
      sortedMonths.forEach(month => {
        monthSelect.add(new Option(month.label, month.id, false, month.id === state.activeMonth));
      });

      const nextButton = document.createElement("button");
      nextButton.type = "button";
      const isLatestMonth = activeIndex === sortedMonths.length - 1;
      nextButton.textContent = isLatestMonth ? "翌月を追加" : "›";
      nextButton.title = isLatestMonth ? "翌月を追加" : "次の月";
      nextButton.setAttribute("aria-label", isLatestMonth ? "翌月を追加" : "次の月");
      nextButton.disabled = activeIndex < 0;

      const selectMonth = id => {
        if (!id) return;
        state.activeMonth = id;
        persist();
        render();
      };
      previousButton.addEventListener("click", () => {
        if (isOldestMonth) {
          addPreviousMonth();
          return;
        }
        selectMonth(sortedMonths[activeIndex - 1]?.id);
      });
      nextButton.addEventListener("click", () => {
        if (isLatestMonth) {
          addNextMonth();
          return;
        }
        selectMonth(sortedMonths[activeIndex + 1]?.id);
      });
      monthSelect.addEventListener("change", () => selectMonth(monthSelect.value));
      tabs.append(previousButton, monthSelect, nextButton);
    }

    function renderEntries() {
      const month = currentMonth();
      const query = searchInput.value.trim().toLowerCase();
      const items = orderedItems(month.items).filter(item => matchesQuery(item, query, month.id));
      const accountGroups = groupItemsByDebitAccount(items);

      list.innerHTML = "";
      list.classList.toggle("reordering", reorderMode);
      reorderButton.classList.toggle("active", reorderMode);
      reorderButton.setAttribute("aria-pressed", String(reorderMode));
      reorderButton.disabled = Boolean(query);
      reorderButton.title = query ? "検索を解除すると並び替えできます" : "銀行と支払い方法を並び替え";

      if (!accountGroups.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "該当する明細がありません";
        list.appendChild(empty);
        return;
      }

      accountGroups.forEach(group => {
        const section = document.createElement("section");
        section.className = "account-group";
        section.dataset.account = group.account;
        const groupKey = `${month.id}\u0000${group.account}`;
        const isCollapsed = collapsedAccountGroups.has(groupKey);
        const groupSum = group.items.reduce((acc, item) => acc + toNumber(item.amount), 0);
        const groupPaid = group.items.filter(item => item.paid).length;
        section.innerHTML = `
          <div class="account-head">
            <button class="drag-handle account-drag-handle" type="button" aria-label="${escapeAttr(group.account)}を並び替え">≡</button>
            <button class="account-toggle" type="button" aria-expanded="${String(!isCollapsed)}">
              <span class="account-chevron" aria-hidden="true">⌄</span>
              <span class="account-title">
                <strong>${escapeHtml(group.account)}</strong>
                <span>支払い済み ${groupPaid} / ${group.items.length}</span>
              </span>
            </button>
            <div class="account-total">${formatAmount(groupSum)}</div>
          </div>
          <div class="account-items" ${isCollapsed ? "hidden" : ""}></div>
        `;

        const accountItems = section.querySelector(".account-items");
        group.items.forEach(item => accountItems.appendChild(renderEntryCard(item, month.id)));
        bindDragHandle(section.querySelector(".account-drag-handle"), "account", group.account, group.account, section);
        section.querySelector(".account-toggle").addEventListener("click", event => {
          const collapsed = !accountItems.hidden;
          accountItems.hidden = collapsed;
          event.currentTarget.setAttribute("aria-expanded", String(!collapsed));
          if (collapsed) {
            collapsedAccountGroups.add(groupKey);
          } else {
            collapsedAccountGroups.delete(groupKey);
          }
        });
        list.appendChild(section);
      });
    }

    function renderEntryCard(item, monthId) {
      const article = document.createElement("article");
      const paymentType = normalizePaymentType(item.paymentType);
      const paymentMethod = paymentType === "card" ? item.paymentMethod || "カード未設定" : "";
      const paymentSourceLabel = paymentType === "card" ? paymentMethod : paymentLabels[paymentType];
      const billingCycleMonths = normalizeBillingCycleMonths(item.billingCycleMonths);
      const debitDate = item.debitDate || dateFromMonthAndDay(monthId, item.debitDay);
      const debitDayLabel = formatDebitDayLabel(debitDate);
      const usagePeriodStartLabel = formatMonthDayLabel(item.usagePeriodStart);
      const usagePeriodEndLabel = formatMonthDayLabel(item.usagePeriodEnd);
      const previousPeriodRange = previousUsagePeriodRange(item, monthId);
      const inheritedDebitDate = previousDebitDate(item, monthId);
      article.className = `entry${item.paid ? " done" : ""}`;
      article.dataset.seriesId = item.seriesId || item.id;
      article.dataset.account = item.debitAccount || unassignedAccount;
      article.innerHTML = `
          <div class="entry-main">
            <button class="drag-handle entry-drag-handle" type="button" aria-label="${escapeAttr(item.content || "明細")}を並び替え">≡</button>
            <button class="check" type="button" title="支払い済み" aria-label="支払い済み">${item.paid ? "✓" : ""}</button>
            <div class="entry-title">
              <strong>${escapeHtml(item.content || "内容未設定")}</strong>
              <div class="entry-meta">
                <span class="payment-source ${paymentType === "card" ? "card" : "direct"}">${escapeHtml(paymentSourceLabel)}</span>
                ${billingCycleMonths > 1 ? `<span class="billing-cycle">${billingCycleLabel(billingCycleMonths)}</span>` : ""}
              </div>
            </div>
            <div class="entry-actions">
              <button class="entry-edit" type="button">編集</button>
              <input class="amount-input" inputmode="numeric" value="${escapeAttr(formatAmountInput(item.amount))}" data-field="amount" aria-label="${escapeAttr(item.content || "明細")}の金額">
            </div>
          </div>
          <div class="entry-fields">
            <div class="field entry-field-period">
              <div class="entry-field-label-row">
                <label>利用期間</label>
                <div class="period-actions">
                  <button class="inline-action" type="button" data-action="previous-period-start" title="前回終了日の翌日から翌月同日までを入力" aria-label="続きの1ヶ月を入力" ${previousPeriodRange ? "" : "disabled"}>続きの1ヶ月</button>
                  <button class="inline-action" type="button" data-action="full-month" title="引落月直前の${billingCycleMonths}ヶ月を月初から月末まで入力" aria-label="直前${billingCycleMonths}ヶ月まるごと入力">直前${billingCycleMonths}ヶ月まるごと</button>
                </div>
              </div>
              <div class="usage-period-control">
                <div class="usage-period-inputs">
                  <input inputmode="numeric" maxlength="5" value="${escapeAttr(usagePeriodStartLabel)}" placeholder="月/日" data-field="usagePeriodStart" data-month-day aria-label="利用期間 開始">
                  <span class="usage-period-separator">〜</span>
                  <input inputmode="numeric" maxlength="5" value="${escapeAttr(usagePeriodEndLabel)}" placeholder="月/日" data-field="usagePeriodEnd" data-month-day aria-label="利用期間 終了">
                </div>
              </div>
            </div>
            <div class="field entry-field-debit">
              <div class="entry-field-label-row">
                <label>引落とし日</label>
                <button class="inline-action" type="button" data-action="previous-debit-date" ${inheritedDebitDate ? "" : "disabled"}>前回の引落日</button>
              </div>
              <input inputmode="numeric" maxlength="2" pattern="[0-9]*" value="${escapeAttr(debitDayLabel)}" data-field="debitDate">
            </div>
            <div class="field entry-field-note">
              <label>備考</label>
              <input value="${escapeAttr(item.note)}" data-field="note">
            </div>
          </div>
        `;

      article.querySelector(".check").addEventListener("click", () => {
        item.paid = !item.paid;
        persist();
        render();
      });
      bindDragHandle(
        article.querySelector(".entry-drag-handle"),
        "series",
        item.seriesId || item.id,
        item.debitAccount || unassignedAccount,
        article
      );
      article.querySelector(".entry-edit").addEventListener("click", () => openSheet(item.id));
      article.querySelector("[data-action='previous-period-start']").addEventListener("click", () => {
        const range = previousUsagePeriodRange(item, monthId);
        if (!range) return;
        item.usagePeriodStart = range.start;
        item.usagePeriodEnd = range.end;
        persist();
        render();
      });
      article.querySelector("[data-action='previous-debit-date']").addEventListener("click", () => {
        const date = previousDebitDate(item, monthId);
        if (!date) return;
        item.debitDate = date;
        item.debitDay = dayFromDate(date);
        persist();
        render();
      });
      const applyCardFullMonth = () => {
        const range = fullCycleRange(monthId, billingCycleMonths);
        if (!range) return;
        item.usagePeriodStart = range.start;
        item.usagePeriodEnd = range.end;
        persist();
        render();
      };
      article.querySelector("[data-action='full-month']").addEventListener("click", applyCardFullMonth);
      article.querySelectorAll("[data-field]").forEach(control => {
        const commitInlineEdit = () => {
          updateInlineField(item, control.dataset.field, control.value, monthId);
          persist();
          render();
        };
        control.addEventListener("change", commitInlineEdit);
        control.addEventListener("blur", commitInlineEdit);
        if (control.dataset.field === "amount") {
          control.addEventListener("input", formatAmountControl);
        }
        if (control.hasAttribute("data-month-day")) {
          control.addEventListener("input", formatMonthDayControl);
        }
      });
      return article;
    }

    function updateInlineField(item, field, value, monthId) {
      const text = String(value || "").trim();
      if (field === "debitAccount") {
        item.debitAccount = text || unassignedAccount;
        return;
      }
      if (field === "paymentType") {
        item.paymentType = normalizePaymentType(text);
        if (item.paymentType !== "card") {
          item.paymentMethod = "";
        }
        return;
      }
      if (field === "paymentMethod") {
        item.paymentMethod = normalizePaymentType(item.paymentType) === "card" ? text : "";
        return;
      }
      if (field === "usedDate") {
        item[field] = normalizeDateValue(text);
        return;
      }
      if (field === "usagePeriodStart" || field === "usagePeriodEnd") {
        const usageDate = usagePeriodDateFromMonthDay(text, item, field, monthId);
        if (usageDate === null) return;
        item[field] = usageDate;
        return;
      }
      if (field === "debitDate") {
        const debitDay = normalizeDebitDay(text);
        if (text && debitDay === null) return;
        item.debitDay = debitDay;
        item.debitDate = debitDay ? dateFromMonthAndDay(monthId, debitDay) : "";
        return;
      }
      if (field === "amount") {
        item.amount = normalizeAmountValue(text);
        return;
      }
      item[field] = text;
    }

    function matchesQuery(item, query, monthId) {
      if (!query) return true;
      const paymentType = normalizePaymentType(item.paymentType);
      const debitDate = item.debitDate || dateFromMonthAndDay(monthId, item.debitDay);
      const usagePeriod = usagePeriodLabel(item);
      const haystack = [
        item.debitAccount,
        item.paymentMethod,
        paymentLabels[paymentType],
        debitDate,
        formatDateLabel(debitDate),
        item.usedDate,
        formatDateLabel(item.usedDate),
        item.usagePeriodStart,
        item.usagePeriodEnd,
        usagePeriod,
        normalizeBillingCycleMonths(item.billingCycleMonths) > 1 ? billingCycleLabel(item.billingCycleMonths) : "",
        item.content,
        item.note,
        item.amount,
        item.method
      ].join(" ").toLowerCase();
      return haystack.includes(query);
    }

    function groupItemsByDebitAccount(items) {
      const groups = new Map();
      items.forEach(item => {
        const account = item.debitAccount || unassignedAccount;
        if (!groups.has(account)) {
          groups.set(account, { account, items: [] });
        }
        groups.get(account).items.push(item);
      });
      return Array.from(groups.values()).sort((a, b) =>
        orderRank(state.sortOrder.accounts, a.account) - orderRank(state.sortOrder.accounts, b.account)
      );
    }

    function orderedItems(items) {
      return items
        .map((item, index) => ({ item, index }))
        .sort((a, b) => {
          const rankDifference = orderRank(state.sortOrder.series, a.item.seriesId || a.item.id) -
            orderRank(state.sortOrder.series, b.item.seriesId || b.item.id);
          return rankDifference || a.index - b.index;
        })
        .map(entry => entry.item);
    }

    function orderRank(order, value) {
      const index = order.indexOf(String(value));
      return index < 0 ? Number.MAX_SAFE_INTEGER : index;
    }

    function accountValues() {
      const accounts = new Set();
      state.months.forEach(month => {
        month.items.forEach(item => {
          const account = String(item.debitAccount || "").trim();
          if (account && account !== unassignedAccount) {
            accounts.add(account);
          }
        });
      });
      return Array.from(accounts).sort((a, b) =>
        orderRank(state.sortOrder.accounts, a) - orderRank(state.sortOrder.accounts, b) || a.localeCompare(b, "ja")
      );
    }

    function renderAccountSuggestions() {
      return accountValues();
    }

    function renderAccountOptions(selectedAccount = "") {
      debitAccountInput.innerHTML = "";
      debitAccountInput.add(new Option("既存の口座から選択", ""));
      accountValues().forEach(account => {
        debitAccountInput.add(new Option(account, account, false, account === selectedAccount));
      });
      debitAccountInput.add(new Option("新しい口座を入力", "__custom__"));
      if (selectedAccount && !accountValues().includes(selectedAccount)) {
        debitAccountInput.add(new Option(selectedAccount, selectedAccount, true, true), 1);
      }
      debitAccountInput.value = selectedAccount || "";
      syncDebitAccountField();
    }

    function syncDebitAccountField() {
      const isCustom = debitAccountInput.value === "__custom__";
      customDebitAccountField.hidden = !isCustom;
      customDebitAccountInput.disabled = !isCustom;
      customDebitAccountInput.required = isCustom;
      if (!isCustom) customDebitAccountInput.value = "";
    }

    function renderSummary() {
      const month = currentMonth();
      const sum = month.items.reduce((acc, item) => acc + toNumber(item.amount), 0);
      const paid = month.items.filter(item => item.paid).length;
      totalAmount.textContent = formatAmount(sum);
      paidCount.textContent = `${paid} / ${month.items.length}`;
    }

    function openMonthSheet() {
      const today = new Date();
      const currentYear = today.getFullYear();
      const currentMonthNumber = today.getMonth() + 1;
      yearInput.innerHTML = "";
      monthInput.innerHTML = "";
      for (let year = currentYear - 3; year <= currentYear + 7; year += 1) {
        yearInput.add(new Option(`${year}年`, String(year), false, year === currentYear));
      }
      for (let month = 1; month <= 12; month += 1) {
        monthInput.add(new Option(`${month}月`, String(month), false, month === currentMonthNumber));
      }
      monthError.textContent = "";
      monthError.classList.remove("show");
      monthSheet.classList.add("open");
      scrim.classList.add("open");
      monthSheet.setAttribute("aria-hidden", "false");
      monthSheet.scrollTop = 0;
    }

    function closeMonthSheet() {
      monthSheet.classList.remove("open");
      scrim.classList.remove("open");
      monthSheet.setAttribute("aria-hidden", "true");
      monthError.textContent = "";
      monthError.classList.remove("show");
    }

    function closeOpenSheet() {
      if (daySheet.classList.contains("open")) {
        closeDaySheet();
        return;
      }
      if (trashSheet.classList.contains("open")) {
        closeTrashSheet();
        return;
      }
      if (monthSheet.classList.contains("open")) {
        closeMonthSheet();
        return;
      }
      if (settingsSheet.classList.contains("open")) {
        closeSettingsSheet();
        return;
      }
      closeSheet();
    }

    function openTrashSheet() {
      if (settingsSheet.classList.contains("open")) closeSettingsSheet();
      trashError.textContent = "";
      trashError.classList.remove("show");
      renderTrash();
      trashSheet.classList.add("open");
      scrim.classList.add("open");
      trashSheet.setAttribute("aria-hidden", "false");
      trashSheet.scrollTop = 0;
    }

    function closeTrashSheet() {
      trashSheet.classList.remove("open");
      scrim.classList.remove("open");
      trashSheet.setAttribute("aria-hidden", "true");
    }

    function renderTrash() {
      state.trash = normalizeTrash(state.trash);
      trashList.innerHTML = "";
      if (!state.trash.length) {
        trashList.innerHTML = '<div class="empty">最近削除した項目はありません</div>';
        return;
      }
      state.trash.slice().sort((a, b) => b.deletedAt.localeCompare(a.deletedAt)).forEach(entry => {
        const element = document.createElement("div");
        element.className = "trash-item";
        element.innerHTML = `
          <strong>${escapeHtml(entry.item.content || "内容未設定")}</strong>
          <span>${escapeHtml(entry.monthLabel)}・${escapeHtml(entry.item.debitAccount || unassignedAccount)}</span>
          <span>削除: ${escapeHtml(formatDateTime(entry.deletedAt))}</span>
          <div class="trash-item-actions">
            <button class="secondary" type="button" data-trash-action="restore">復元</button>
            <button class="danger" type="button" data-trash-action="delete">完全削除</button>
          </div>`;
        element.querySelector('[data-trash-action="restore"]').addEventListener("click", () => restoreTrashItem(entry.id));
        element.querySelector('[data-trash-action="delete"]').addEventListener("click", () => permanentlyDeleteTrashItem(entry.id));
        trashList.appendChild(element);
      });
    }

    function restoreTrashItem(id) {
      const entry = state.trash.find(item => item.id === id);
      const month = state.months.find(item => item.id === entry?.monthId);
      if (!entry || !month) return;
      if (month.items.some(item => String(item.seriesId) === String(entry.item.seriesId))) {
        trashError.textContent = "同じ支払い方法が既に存在するため復元できません。";
        trashError.classList.add("show");
        return;
      }
      month.items.push(normalizeItem(entry.item, month.id));
      state.trash = state.trash.filter(item => item.id !== id);
      persist();
      renderTrash();
      render();
    }

    function permanentlyDeleteTrashItem(id) {
      state.trash = state.trash.filter(item => item.id !== id);
      persist();
      renderTrash();
      render();
    }

    function addSelectedMonth(event) {
      event.preventDefault();
      const year = Number(yearInput.value);
      const month = Number(monthInput.value);
      const id = `${year}-${String(month).padStart(2, "0")}`;
      const label = `${year}年${month}月`;
      if (state.months.some(existing => existing.id === id)) {
        monthError.textContent = `${label}は既に追加されています。`;
        monthError.classList.add("show");
        return;
      }
      addMonth(id, label);
      closeMonthSheet();
    }

    function addNextMonth() {
      const latestMonth = state.months.slice().sort((a, b) => a.id.localeCompare(b.id)).at(-1);
      if (!latestMonth) return;
      const id = offsetMonthId(latestMonth.id, 1);
      addMonth(id, formatMonthLabel(id));
    }

    function addPreviousMonth() {
      const oldestMonth = state.months.slice().sort((a, b) => a.id.localeCompare(b.id))[0];
      if (!oldestMonth) return;
      const id = offsetMonthId(oldestMonth.id, -1);
      if (state.months.some(existing => existing.id === id)) return;
      state.months.push({
        id,
        label: formatMonthLabel(id),
        items: itemsForPreviousMonth(id, oldestMonth)
      });
      state.months.sort((a, b) => a.id.localeCompare(b.id));
      state.activeMonth = id;
      persist();
      render();
    }

    function addMonth(id, label = formatMonthLabel(id)) {
      if (state.months.some(existing => existing.id === id)) return false;
      state.months.push({
        id,
        label,
        items: itemsForNewMonth(id)
      });
      state.months.sort((a, b) => a.id.localeCompare(b.id));
      state.activeMonth = id;
      persist();
      render();
      return true;
    }

    function openSheet(id) {
      const item = id ? currentMonth().items.find(entry => entry.id === id) : null;
      const itemBillingCycle = normalizeBillingCycleMonths(item?.billingCycleMonths);
      editingId = id || null;
      sheetTitle.textContent = item ? "明細の詳細" : "明細を追加";
      deleteButton.style.display = item ? "block" : "none";
      clearEntryError();
      renderAccountOptions(item?.debitAccount || "");
      customDebitAccountInput.value = "";
      paymentTypeInput.value = normalizePaymentType(item?.paymentType);
      paymentMethodInput.value = item?.paymentMethod || "";
      contentInput.value = item?.content || "";
      if ([1, 2, 3, 6, 12].includes(itemBillingCycle)) {
        billingCycleInput.value = String(itemBillingCycle);
        customBillingCycleInput.value = "";
      } else {
        billingCycleInput.value = "custom";
        customBillingCycleInput.value = String(itemBillingCycle);
      }
      noteInput.value = item?.note || "";
      syncPaymentMethodField();
      syncBillingCycleField();
      sheet.classList.add("open");
      scrim.classList.add("open");
      sheet.setAttribute("aria-hidden", "false");
      sheet.scrollTop = 0;
      debitAccountInput.focus();
    }

    function openSettingsSheet() {
      settingsSheet.classList.add("open");
      scrim.classList.add("open");
      settingsSheet.setAttribute("aria-hidden", "false");
      settingsSheet.scrollTop = 0;
    }

    function closeSettingsSheet() {
      settingsSheet.classList.remove("open");
      scrim.classList.remove("open");
      settingsSheet.setAttribute("aria-hidden", "true");
    }

    function closeSheet() {
      sheet.classList.remove("open");
      scrim.classList.remove("open");
      sheet.setAttribute("aria-hidden", "true");
      form.reset();
      clearEntryError();
      editingId = null;
    }

    function saveEntry(event) {
      event.preventDefault();
      const month = currentMonth();
      const paymentType = normalizePaymentType(paymentTypeInput.value);
      const debitAccount = debitAccountInput.value === "__custom__"
        ? customDebitAccountInput.value.trim()
        : debitAccountInput.value.trim();
      const paymentMethod = paymentType === "card" ? paymentMethodInput.value.trim() : "";
      const content = contentInput.value.trim();
      const selectedCycleValue = billingCycleInput.value === "custom"
        ? customBillingCycleInput.value
        : billingCycleInput.value;
      const existingItem = editingId ? month.items.find(entry => entry.id === editingId) : null;

      if (!debitAccount) {
        showEntryError("引落口座を入力してください。");
        return;
      }

      if (!content) {
        showEntryError("内容を入力してください。");
        return;
      }

      if (paymentType === "card" && !paymentMethod) {
        showEntryError("カード払いの場合はカード名を入力してください。");
        return;
      }

      if (!isValidBillingCycleMonths(selectedCycleValue)) {
        showEntryError("支払い周期は1〜120ヶ月の整数で入力してください。");
        return;
      }

      const billingCycleMonths = Number(selectedCycleValue);
      const existingCycle = normalizeBillingCycleMonths(existingItem?.billingCycleMonths);
      const billingStartMonth = existingItem && existingCycle === billingCycleMonths
        ? normalizeBillingStartMonth(existingItem.billingStartMonth, month.id)
        : month.id;

      const payload = {
        debitAccount,
        paymentType,
        paymentMethod,
        content,
        amount: existingItem?.amount || "",
        usedDate: existingItem?.usedDate || "",
        debitDate: existingItem?.debitDate || "",
        debitDay: existingItem?.debitDay || null,
        billingCycleMonths,
        billingStartMonth,
        usagePeriodStart: existingItem?.usagePeriodStart || "",
        usagePeriodEnd: existingItem?.usagePeriodEnd || "",
        paidDate: existingItem?.paidDate || "",
        note: noteInput.value.trim()
      };

      if (editingId) {
        const item = existingItem;
        Object.assign(item, { seriesId: item.seriesId || item.id }, payload);
      } else {
        const id = crypto.randomUUID();
        month.items.push({ id, seriesId: id, paid: false, ...payload });
      }
      persist();
      closeSheet();
      render();
    }

    function syncPaymentMethodField() {
      clearEntryError();
      const isCard = paymentTypeInput.value === "card";
      paymentMethodField.hidden = !isCard;
      paymentMethodInput.disabled = !isCard;
      paymentMethodInput.required = isCard;
      if (!isCard) {
        paymentMethodInput.value = "";
      }
    }

    function syncBillingCycleField() {
      const isCustom = billingCycleInput.value === "custom";
      customBillingCycleField.hidden = !isCustom;
      customBillingCycleInput.disabled = !isCustom;
      customBillingCycleInput.required = isCustom;
      clearEntryError();
    }

    function showEntryError(message) {
      entryError.textContent = message;
      entryError.classList.add("show");
    }

    function clearEntryError() {
      entryError.textContent = "";
      entryError.classList.remove("show");
    }

    function deleteEntry() {
      if (!editingId) return;
      const month = currentMonth();
      const item = month.items.find(entry => entry.id === editingId);
      if (item) {
        state.trash.push({
          id: crypto.randomUUID(),
          deletedAt: new Date().toISOString(),
          monthId: month.id,
          monthLabel: month.label,
          item: structuredClone(item)
        });
      }
      month.items = month.items.filter(item => item.id !== editingId);
      persist();
      closeSheet();
      render();
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = "payment-notes.json";
      anchor.click();
      URL.revokeObjectURL(url);
    }

    async function importJson(event) {
      const [file] = event.target.files;
      if (!file) return;
      try {
        const imported = JSON.parse(await file.text());
        if (!imported || !Array.isArray(imported.months) || !imported.months.length) {
          throw new Error("Invalid backup");
        }
        replaceState(imported, imported.updatedAt);
        persist({ keepUpdatedAt: true });
        closeSettingsSheet();
        render();
      } catch (error) {
        alert("バックアップファイルを読み込めませんでした。");
      } finally {
        event.target.value = "";
      }
    }

    async function setupCloudSync() {
      if (!isCloudSyncConfigured()) {
        renderIntegrationStatus();
        return;
      }

      if (!window.supabase?.createClient) {
        renderIntegrationStatus("Supabaseライブラリを読み込めませんでした。");
        return;
      }

      supabaseClient = window.supabase.createClient(
        config.supabaseUrl,
        config.supabasePublishableKey,
        {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true
          }
        }
      );

      supabaseClient.auth.onAuthStateChange(async (_event, session) => {
        currentSession = session;
        if (session?.user) {
          emailInput.value = session.user.email || "";
          switchToUserStorage(session.user);
          render();
          await syncState();
        } else {
          switchToAnonymousStorage();
          render();
        }
        renderIntegrationStatus();
      });

      try {
        const { data, error } = await supabaseClient.auth.getSession();
        if (error) throw error;
        currentSession = data.session;
        if (currentSession?.user) {
          emailInput.value = currentSession.user.email || "";
          switchToUserStorage(currentSession.user);
          render();
          await syncState();
        } else {
          switchToAnonymousStorage();
          render();
        }
      } catch (error) {
        handleSyncError(error);
      }
    }

    function isCloudSyncConfigured() {
      return Boolean(
        config.cloudSyncEnabled &&
        config.supabaseUrl &&
        config.supabasePublishableKey
      );
    }

    async function sendMagicLink() {
      if (!isCloudSyncConfigured() || !supabaseClient) return;

      const email = emailInput.value.trim();
      if (!email) {
        renderIntegrationStatus("メールアドレスを入力してください。");
        return;
      }

      if (!emailInput.checkValidity()) {
        renderIntegrationStatus("有効なメールアドレスを入力してください。");
        return;
      }

      try {
        renderIntegrationStatus("ログインリンクを送信中...");
        const { error } = await supabaseClient.auth.signInWithOtp({
          email,
          options: {
            emailRedirectTo: config.supabaseRedirectUrl || `${location.origin}${location.pathname}`
          }
        });
        if (error) throw error;
        renderIntegrationStatus("ログイン用メールを送信しました。リンクを開いてください。");
      } catch (error) {
        handleSyncError(error);
      }
    }

    async function signOut() {
      if (!supabaseClient) return;
      try {
        const { error } = await supabaseClient.auth.signOut();
        if (error) throw error;
        clearTimeout(syncTimer);
        currentSession = null;
        switchToAnonymousStorage();
        render();
        renderIntegrationStatus("ログアウトしました。");
      } catch (error) {
        handleSyncError(error);
      }
    }

    function scheduleCloudSync() {
      if (!currentSession || !supabaseClient) return;
      clearTimeout(syncTimer);
      syncTimer = setTimeout(() => {
        pushStateToCloud().catch(handleSyncError);
      }, 900);
    }

    async function syncState(options = {}) {
      if (!currentSession || !supabaseClient) {
        renderIntegrationStatus();
        return;
      }

      try {
        renderIntegrationStatus("同期中...");
        const { data, error } = await supabaseClient
          .from(syncTable)
          .select("state, updated_at")
          .eq("user_id", currentSession.user.id)
          .maybeSingle();

        if (error) throw error;

        const localUpdatedAt = new Date(state.updatedAt || 0).getTime();
        const remoteUpdatedAt = new Date(data?.updated_at || 0).getTime();

        const shouldUseRemote = data?.state &&
          !options.forcePush &&
          (activeStateSource === "seed" || remoteUpdatedAt > localUpdatedAt);

        if (shouldUseRemote) {
          activeStateSource = "remote";
          replaceState(data.state, data.updated_at);
          render();
          renderIntegrationStatus(`同期済み ${formatDateTime(data.updated_at)}`);
          return;
        }

        await pushStateToCloud();
      } catch (error) {
        handleSyncError(error);
      }
    }

    async function pushStateToCloud() {
      if (!currentSession || !supabaseClient) return;

      const updatedAt = new Date().toISOString();
      state.updatedAt = updatedAt;

      const { error } = await supabaseClient
        .from(syncTable)
        .upsert({
          user_id: currentSession.user.id,
          state: structuredClone(state),
          updated_at: updatedAt
        }, { onConflict: "user_id" });

      if (error) throw error;

      localStorage.setItem(activeStorageKey, JSON.stringify(state));
      activeStateSource = "user";
      renderIntegrationStatus(`同期済み ${formatDateTime(updatedAt)}`);
    }

    function handleSyncError(error) {
      console.warn(error);
      renderIntegrationStatus(`同期エラー: ${error.message || "不明なエラー"}`);
    }

    function renderIntegrationStatus(message) {
      const configured = isCloudSyncConfigured();
      const connected = Boolean(currentSession);
      const defaultMessage = configured
        ? connected
          ? `接続済み: ${currentSession.user.email || "ログイン中"}`
          : "未ログイン。メールリンクでログインできます。"
        : "Supabase設定が必要です。設定後もローカル保存は使えます。";

      document.getElementById("cloudSyncStatus").textContent = message || defaultMessage;

      emailInput.disabled = !configured || connected;
      signInButton.disabled = !configured || connected;
      signOutButton.disabled = !configured || !connected;
      syncNowButton.disabled = !configured || !connected;
    }

    function setupWebAds() {
      adSlot.classList.remove("ready");
      adSlot.replaceChildren();

      if (!isWebAdsConfigured()) return;

      const publisherId = String(config.adsensePublisherId || "").trim();
      const slotId = String(config.adsenseBannerSlotId || "").trim();
      window.adsbygoogle = window.adsbygoogle || [];

      if (config.adsenseNonPersonalizedAds !== false) {
        window.adsbygoogle.requestNonPersonalizedAds = 1;
      }

      const banner = document.createElement("ins");
      banner.className = "adsbygoogle";
      banner.style.display = "block";
      banner.setAttribute("data-ad-client", publisherId);
      banner.setAttribute("data-ad-slot", slotId);
      banner.setAttribute("data-ad-format", "auto");
      banner.setAttribute("data-full-width-responsive", "true");
      adSlot.appendChild(banner);
      adSlot.classList.add("ready");
      loadAdsenseScript(publisherId);

      try {
        window.adsbygoogle.push({});
      } catch (error) {
        console.warn(error);
      }
    }

    function isWebAdsConfigured() {
      return Boolean(
        config.webAdsEnabled &&
        config.webAdsProvider === "adsense" &&
        String(config.adsensePublisherId || "").trim() &&
        String(config.adsenseBannerSlotId || "").trim() &&
        !isLocalAdHost()
      );
    }

    function isLocalAdHost() {
      return location.protocol === "file:" ||
        location.hostname === "localhost" ||
        location.hostname === "127.0.0.1" ||
        location.hostname === "0.0.0.0" ||
        location.hostname === "::1";
    }

    function loadAdsenseScript(publisherId) {
      const scriptId = "adsense-script";
      if (document.getElementById(scriptId)) return;

      const script = document.createElement("script");
      script.id = scriptId;
      script.async = true;
      script.crossOrigin = "anonymous";
      script.src = `https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=${encodeURIComponent(publisherId)}`;
      document.head.appendChild(script);
    }

    function formatDateTime(value) {
      if (!value) return "";
      return new Intl.DateTimeFormat("ja-JP", {
        month: "numeric",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(value));
    }

    function toNumber(value) {
      return Number(String(value).replace(/[^\d.-]/g, "")) || 0;
    }

    function normalizeAmountValue(value) {
      const digits = String(value ?? "").replace(/[^\d]/g, "");
      if (!digits) return "";
      return String(Number(digits));
    }

    function formatAmountInput(value) {
      const normalized = normalizeAmountValue(value);
      return normalized ? new Intl.NumberFormat("ja-JP").format(Number(normalized)) : "";
    }

    function formatAmountControl(event) {
      const control = event.currentTarget;
      const beforeCursor = control.value.slice(0, control.selectionStart ?? control.value.length);
      const digitsBeforeCursor = beforeCursor.replace(/[^\d]/g, "").length;
      const formatted = formatAmountInput(control.value);
      control.value = formatted;
      let cursor = 0;
      let seenDigits = 0;
      while (cursor < formatted.length && seenDigits < digitsBeforeCursor) {
        if (/\d/.test(formatted[cursor])) seenDigits += 1;
        cursor += 1;
      }
      control.setSelectionRange(cursor, cursor);
    }

    function formatMonthDayControl(event) {
      const control = event.currentTarget;
      const raw = control.value.replace(/[^\d/]/g, "");
      if (raw.includes("/")) {
        const [month = "", day = ""] = raw.split("/");
        const monthDigits = month.replace(/\D/g, "").slice(0, 2);
        const dayDigits = day.replace(/\D/g, "").slice(0, 2);
        control.value = `${monthDigits}/${dayDigits}`;
      } else {
        const digits = raw.replace(/\D/g, "").slice(0, 4);
        control.value = digits.length > 2
          ? `${digits.slice(0, 2)}/${digits.slice(2)}`
          : digits;
      }
      const cursor = control.value.length;
      control.setSelectionRange(cursor, cursor);
    }

    function formatAmount(value) {
      const number = toNumber(value);
      if (!number) return "¥0";
      return new Intl.NumberFormat("ja-JP", {
        style: "currency",
        currency: "JPY",
        maximumFractionDigits: 0
      }).format(number);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }
  </script>
