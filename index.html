<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7f3eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="引落メモ">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <title>口座別引落 月別管理</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #fbfaf7;
      --ink: #24211c;
      --muted: #746d63;
      --line: #ded7cb;
      --panel: #fffdf9;
      --accent: #1d6f68;
      --accent-soft: #dff0ed;
      --warn: #9b5d22;
      --rose: #b85454;
      --shadow: 0 20px 50px rgba(70, 55, 34, .12);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% -10%, rgba(29, 111, 104, .13), transparent 32rem),
        linear-gradient(180deg, #f7f3eb 0%, #fdfcf9 42%, #eef4f2 100%);
      color: var(--ink);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(100%, 460px);
      min-height: 100vh;
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 4px 2px 16px;
    }

    .title-block {
      min-width: 0;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      margin: 0 0 4px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .icon-button {
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--panel);
      color: var(--ink);
      box-shadow: 0 8px 22px rgba(75, 59, 35, .12);
      border: 1px solid rgba(98, 81, 50, .09);
      font-size: 21px;
    }

    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      min-width: 0;
      border: 1px solid var(--line);
      background: rgba(255, 253, 249, .84);
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 10px 24px rgba(65, 54, 38, .07);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .metric strong {
      display: block;
      font-size: 21px;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 5;
      margin: 0 -16px 12px;
      padding: 10px 16px;
      background: rgba(247, 243, 235, .88);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(173, 159, 136, .28);
    }

    .search {
      display: grid;
      grid-template-columns: 28px 1fr;
      align-items: center;
      height: 44px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 0 12px;
      color: var(--muted);
    }

    .search input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      min-width: 0;
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 0 0;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      flex: 0 0 auto;
      min-width: 92px;
      height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fffaf1;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .tab[aria-selected="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .month-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 2px 12px;
    }

    .month-head h2 {
      margin: 0;
      font-size: 19px;
      letter-spacing: 0;
    }

    .compact-actions {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    .soft-button {
      display: inline-grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent-soft);
      color: #0f5550;
      font-size: 20px;
      font-weight: 800;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .account-group {
      display: grid;
      gap: 8px;
    }

    .account-group + .account-group {
      margin-top: 12px;
    }

    .account-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 2px 5px;
      border-bottom: 1px solid rgba(173, 159, 136, .38);
    }

    .account-title {
      min-width: 0;
    }

    .account-title strong {
      display: block;
      font-size: 17px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .account-title span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .account-total {
      flex: 0 0 auto;
      color: var(--accent);
      font-size: 18px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .account-items {
      display: grid;
      gap: 8px;
    }

    .entry {
      border: 1px solid var(--line);
      background: rgba(255, 253, 249, .92);
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 10px 28px rgba(72, 57, 37, .08);
    }

    .entry-main {
      display: grid;
      grid-template-columns: 34px 1fr auto;
      gap: 10px;
      align-items: start;
    }

    .check {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid #b8ada0;
      background: #fff;
      color: white;
      display: grid;
      place-items: center;
      font-size: 16px;
      line-height: 1;
    }

    .entry.done .check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .entry-title {
      min-width: 0;
    }

    .entry-title strong {
      display: block;
      font-size: 16px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .entry-title > span {
      display: inline-block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .entry-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .payment-pill,
    .payment-method,
    .debit-date,
    .used-date,
    .usage-period,
    .billing-cycle {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
    }

    .payment-pill {
      background: #f0eadf;
      color: #685c4d;
    }

    .payment-pill.card {
      background: var(--accent-soft);
      color: #0f5550;
    }

    .payment-method {
      background: #fff7e5;
      color: var(--warn);
      border: 1px solid #eadab8;
    }

    .debit-date,
    .used-date,
    .usage-period {
      background: #f7f4ee;
      color: var(--muted);
      border: 1px solid #e5ddd0;
      font-size: 11px;
    }

    .used-date {
      background: #f2faf8;
      color: #23645f;
      border-color: #cfe6e2;
    }

    .usage-period {
      background: #fff7e5;
      color: var(--warn);
      border-color: #eadab8;
    }

    .billing-cycle {
      background: #eef7f6;
      color: #23645f;
      border: 1px solid #cfe6e2;
      font-size: 11px;
    }

    .amount {
      min-width: 84px;
      max-width: 118px;
      border: 1px solid #d9ede9;
      border-radius: 999px;
      background: #f2faf8;
      padding: 5px 10px;
      text-align: right;
      color: var(--accent);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      overflow-wrap: anywhere;
    }

    .entry-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field[hidden] {
      display: none;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      min-width: 0;
      border: 1px solid #d8d0c3;
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 10px;
      outline-color: var(--accent);
    }

    .field textarea {
      min-height: 54px;
      resize: vertical;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .form-error {
      display: none;
      margin: 0;
      border: 1px solid #e6b7ad;
      border-radius: 8px;
      background: #fff1ed;
      color: #963e31;
      padding: 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .form-error.show {
      display: block;
    }

    .empty {
      border: 1px dashed #c8bdaa;
      border-radius: 8px;
      padding: 24px 14px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 253, 249, .56);
    }

    .sheet {
      position: fixed;
      inset: auto 0 0;
      z-index: 20;
      transform: translateY(110%);
      transition: transform .22s ease;
      padding: 14px 16px max(18px, env(safe-area-inset-bottom));
      background: #fffdf9;
      border-radius: 18px 18px 0 0;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
    }

    .sheet.open {
      transform: translateY(0);
    }

    .sheet form {
      width: min(100%, 440px);
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .sheet h2 {
      margin: 0;
      font-size: 18px;
    }

    #settingsSheet {
      display: grid;
      gap: 12px;
    }

    .primary {
      height: 44px;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-weight: 800;
    }

    .danger {
      height: 40px;
      border-radius: 8px;
      background: #f7e6e2;
      color: var(--rose);
      font-weight: 800;
    }

    .secondary {
      height: 44px;
      border: 1px solid #cfc5b7;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-weight: 800;
    }

    .status {
      display: grid;
      gap: 5px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
    }

    .status strong {
      font-size: 14px;
    }

    .status span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .sync-panel {
      display: grid;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
    }

    .sync-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .sync-actions .secondary {
      height: 40px;
    }

    .primary:disabled,
    .secondary:disabled {
      cursor: not-allowed;
      opacity: .55;
    }

    .ad-slot {
      position: sticky;
      bottom: 0;
      display: none;
      min-height: 50px;
      margin: 16px -16px calc(-1 * max(24px, env(safe-area-inset-bottom)));
      padding-bottom: env(safe-area-inset-bottom);
      background: #fff;
      border-top: 1px solid var(--line);
    }

    .ad-slot.ready {
      display: block;
    }

    .scrim {
      position: fixed;
      inset: 0;
      z-index: 15;
      background: rgba(33, 28, 20, .22);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }

    .scrim.open {
      opacity: 1;
      pointer-events: auto;
    }

    @media (max-width: 360px) {
      .entry-fields,
      .summary {
        grid-template-columns: 1fr;
      }

      .amount {
        min-width: 68px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="title-block">
        <p class="eyebrow">Monthly payments</p>
        <h1>口座別引落</h1>
      </div>
      <button class="icon-button" id="settingsButton" type="button" title="設定" aria-label="設定">⚙</button>
    </header>

    <section class="summary" aria-label="集計">
      <div class="metric">
        <span>今月の引落合計</span>
        <strong id="totalAmount">¥0</strong>
      </div>
      <div class="metric">
        <span>支払い済み</span>
        <strong id="paidCount">0 / 0</strong>
      </div>
    </section>

    <section class="toolbar">
      <label class="search" for="searchInput">
        <span>⌕</span>
        <input id="searchInput" type="search" placeholder="検索">
      </label>
      <nav class="tabs" id="monthTabs" aria-label="月"></nav>
    </section>

    <section class="month-head">
      <h2 id="monthTitle"></h2>
      <div class="compact-actions">
        <button class="soft-button" id="addMonthButton" type="button" title="月を追加" aria-label="月を追加">＋</button>
        <button class="soft-button" id="addEntryButton" type="button" title="明細を追加" aria-label="明細を追加">✎</button>
      </div>
    </section>

    <section class="list" id="entryList" aria-live="polite"></section>
    <aside class="ad-slot" id="adSlot" aria-label="広告"></aside>
  </main>

  <input id="importInput" type="file" accept="application/json" hidden>
  <div class="scrim" id="scrim"></div>
  <aside class="sheet" id="entrySheet" aria-hidden="true">
    <form id="entryForm" novalidate>
      <div class="sheet-head">
        <h2 id="sheetTitle">明細</h2>
        <button class="icon-button" id="closeSheetButton" type="button" title="閉じる" aria-label="閉じる">×</button>
      </div>
      <div class="field">
        <label for="debitAccountInput">引落口座</label>
        <input id="debitAccountInput" list="accountSuggestions" required>
        <datalist id="accountSuggestions"></datalist>
      </div>
      <div class="field">
        <label for="paymentTypeInput">支払い種別</label>
        <select id="paymentTypeInput">
          <option value="direct">直接引落</option>
          <option value="card">カード払い</option>
        </select>
      </div>
      <div class="field" id="paymentMethodField">
        <label for="paymentMethodInput">カード名</label>
        <input id="paymentMethodInput" placeholder="リクルートカード">
      </div>
      <div class="field">
        <label for="contentInput">内容</label>
        <input id="contentInput" required>
      </div>
      <div class="field">
        <label for="amountInput">金額</label>
        <input id="amountInput" inputmode="numeric" placeholder="0">
      </div>
      <div class="field">
        <label for="usedDateInput">利用日</label>
        <input id="usedDateInput" type="date">
      </div>
      <div class="field">
        <label for="debitDateInput">引き落とし日</label>
        <input id="debitDateInput" type="date">
      </div>
      <div class="field">
        <label for="billingCycleInput">支払い周期</label>
        <select id="billingCycleInput">
          <option value="1">毎月</option>
          <option value="2">2ヶ月ごと</option>
          <option value="3">3ヶ月ごと</option>
          <option value="6">6ヶ月ごと</option>
          <option value="12">12ヶ月ごと</option>
        </select>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="usagePeriodStartInput">利用期間 開始</label>
          <input id="usagePeriodStartInput" type="date">
        </div>
        <div class="field">
          <label for="usagePeriodEndInput">利用期間 終了</label>
          <input id="usagePeriodEndInput" type="date">
        </div>
      </div>
      <div class="field">
        <label for="noteInput">備考</label>
        <textarea id="noteInput"></textarea>
      </div>
      <p class="form-error" id="entryError" role="alert"></p>
      <button class="primary" type="submit">保存</button>
      <button class="danger" id="deleteEntryButton" type="button">削除</button>
    </form>
  </aside>
  <aside class="sheet" id="monthSheet" aria-hidden="true">
    <form id="monthForm">
      <div class="sheet-head">
        <h2>年月を追加</h2>
        <button class="icon-button" id="closeMonthSheetButton" type="button" title="閉じる" aria-label="年月追加を閉じる">×</button>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="yearInput">年</label>
          <select id="yearInput"></select>
        </div>
        <div class="field">
          <label for="monthInput">月</label>
          <select id="monthInput"></select>
        </div>
      </div>
      <p class="form-error" id="monthError" role="alert"></p>
      <button class="primary" type="submit">追加</button>
    </form>
  </aside>
  <aside class="sheet" id="settingsSheet" aria-hidden="true">
    <div class="sheet-head">
      <h2>設定</h2>
      <button class="icon-button" id="closeSettingsSheetButton" type="button" title="閉じる" aria-label="設定を閉じる">×</button>
    </div>
    <div class="status">
      <strong>クラウド同期</strong>
      <span id="cloudSyncStatus">未接続</span>
    </div>
    <div class="sync-panel">
      <div class="field">
        <label for="emailInput">メールアドレス</label>
        <input id="emailInput" type="email" inputmode="email" autocomplete="email" placeholder="you@example.com">
      </div>
      <button class="primary" id="signInButton" type="button">メールリンクでログイン</button>
      <div class="sync-actions">
        <button class="secondary" id="syncNowButton" type="button">今すぐ同期</button>
        <button class="secondary" id="signOutButton" type="button">ログアウト</button>
      </div>
    </div>
    <button class="secondary" id="exportButton" type="button">バックアップを書き出す</button>
    <button class="secondary" id="importButton" type="button">バックアップから復元する</button>
  </aside>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="app-config.js"></script>
  <script>
    const unassignedAccount = "引落口座未設定";
    const paymentLabels = {
      direct: "直接引落",
      card: "カード払い"
    };

    const seed = {
      activeMonth: "2026-05",
      months: [
        {
          id: "2026-05",
          label: "2026年5月",
          items: [
            { id: "sbi-rent", seriesId: "sbi-rent", debitAccount: "住信SBIネット銀行", paymentType: "direct", paymentMethod: "", content: "家賃", amount: "", debitDay: null, billingCycleMonths: 1, billingStartMonth: "2026-05", note: "", paid: false },
            { id: "recruit-gas", seriesId: "recruit-gas", debitAccount: unassignedAccount, paymentType: "card", paymentMethod: "リクルートカード", content: "ガス代", amount: "", debitDay: null, billingCycleMonths: 1, billingStartMonth: "2026-05", note: "", paid: false },
            { id: "recruit-water", seriesId: "recruit-water", debitAccount: unassignedAccount, paymentType: "card", paymentMethod: "リクルートカード", content: "水道", amount: "", debitDay: null, billingCycleMonths: 2, billingStartMonth: "2026-05", note: "", paid: false },
            { id: "paypay-bank", seriesId: "paypay-bank", debitAccount: "PayPay銀行", paymentType: "direct", paymentMethod: "", content: "", amount: "", debitDay: null, billingCycleMonths: 1, billingStartMonth: "2026-05", note: "", paid: false },
            { id: "paypay-card", seriesId: "paypay-card", debitAccount: unassignedAccount, paymentType: "card", paymentMethod: "PayPayカード", content: "普段使い", amount: "", debitDay: null, billingCycleMonths: 1, billingStartMonth: "2026-05", note: "", paid: false },
            { id: "orico-card", seriesId: "orico-card", debitAccount: unassignedAccount, paymentType: "card", paymentMethod: "オリコカード", content: "予備", amount: "", debitDay: null, billingCycleMonths: 1, billingStartMonth: "2026-05", note: "", paid: false },
            { id: "smbc", seriesId: "smbc", debitAccount: "SMBC", paymentType: "direct", paymentMethod: "", content: "", amount: "", debitDay: null, billingCycleMonths: 1, billingStartMonth: "2026-05", note: "", paid: false },
            { id: "olive-card", seriesId: "olive-card", debitAccount: unassignedAccount, paymentType: "card", paymentMethod: "Oliveカード", content: "SBI証券", amount: "", debitDay: null, billingCycleMonths: 1, billingStartMonth: "2026-05", note: "", paid: false }
          ]
        }
      ]
    };

    const storageKey = "notion-payment-notes-v1";
    const config = window.APP_CONFIG || {};
    const syncTable = config.supabaseStateTable || "user_states";
    let activeStorageKey = storageKey;
    let activeStateSource = "anonymous";
    const state = loadState(activeStorageKey);
    let editingId = null;
    let supabaseClient = null;
    let currentSession = null;
    let syncTimer = null;

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      navigator.serviceWorker.register("sw.js").catch(error => console.warn(error));
    }

    function loadState(key = storageKey) {
      return readStoredState(key) || normalizeState(structuredClone(seed));
    }

    function readStoredState(key) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return null;
        const saved = JSON.parse(raw);
        if (saved && Array.isArray(saved.months)) return normalizeState(saved);
      } catch (error) {
        console.warn(error);
      }
      return null;
    }

    function persist(options = {}) {
      if (!options.keepUpdatedAt) {
        state.updatedAt = new Date().toISOString();
      }
      localStorage.setItem(activeStorageKey, JSON.stringify(state));
      activeStateSource = currentSession ? "user" : "anonymous";
      if (options.sync !== false) {
        scheduleCloudSync();
      }
    }

    function normalizeState(value) {
      const normalized = value && typeof value === "object" ? value : structuredClone(seed);
      normalized.months = Array.isArray(normalized.months) && normalized.months.length
        ? normalized.months.map(normalizeMonth)
        : structuredClone(seed.months).map(normalizeMonth);
      normalized.activeMonth = normalized.months.some(month => month.id === normalized.activeMonth)
        ? normalized.activeMonth
        : normalized.months[0]?.id || seed.activeMonth;
      normalized.updatedAt = normalized.updatedAt || new Date().toISOString();
      normalized.schemaVersion = 5;
      return normalized;
    }

    function normalizeMonth(month) {
      const id = month?.id || seed.activeMonth;
      return {
        id,
        label: month?.label || formatMonthLabel(id),
        items: Array.isArray(month?.items) ? month.items.map(item => normalizeItem(item, id)) : []
      };
    }

    function normalizeItem(item, monthId = seed.activeMonth) {
      const id = item?.id || crypto.randomUUID();
      const paymentType = normalizePaymentType(item?.paymentType);
      const billingCycleMonths = normalizeBillingCycleMonths(item?.billingCycleMonths);
      const billingStartMonth = normalizeBillingStartMonth(item?.billingStartMonth, monthId);
      const debitDate = normalizeDebitDate(item, monthId);
      const debitDay = dayFromDate(debitDate) || normalizeDebitDay(item?.debitDay);
      const usedDate = normalizeDateValue(item?.usedDate);
      const usagePeriodStart = normalizeDateValue(item?.usagePeriodStart);
      const usagePeriodEnd = normalizeDateValue(item?.usagePeriodEnd);
      const hasAccountModel = "debitAccount" in Object(item) ||
        "paymentType" in Object(item) ||
        "paymentMethod" in Object(item);

      if (hasAccountModel) {
        return {
          id,
          seriesId: String(item.seriesId || id),
          debitAccount: String(item.debitAccount || unassignedAccount).trim() || unassignedAccount,
          paymentType,
          paymentMethod: paymentType === "card"
            ? String(item.paymentMethod || item.method || "").trim()
            : "",
          content: String(item.content || "").trim(),
          amount: String(item.amount || "").trim(),
          usedDate,
          debitDate,
          debitDay,
          billingCycleMonths,
          billingStartMonth,
          usagePeriodStart,
          usagePeriodEnd,
          note: String(item.note || "").trim(),
          paid: Boolean(item.paid)
        };
      }

      const legacyMethod = String(item?.method || "").trim();
      const legacyIsCard = isLikelyCardMethod(legacyMethod);
      return {
        id,
        seriesId: String(item?.seriesId || id),
        debitAccount: legacyIsCard ? unassignedAccount : legacyMethod || unassignedAccount,
        paymentType: legacyIsCard ? "card" : "direct",
        paymentMethod: legacyIsCard ? legacyMethod : "",
        content: String(item?.content || "").trim(),
        amount: String(item?.amount || "").trim(),
        usedDate,
        debitDate,
        debitDay,
        billingCycleMonths,
        billingStartMonth,
        usagePeriodStart,
        usagePeriodEnd,
        note: String(item?.note || "").trim(),
        paid: Boolean(item?.paid)
      };
    }

    function normalizePaymentType(value) {
      return value === "card" ? "card" : "direct";
    }

    function normalizeDebitDay(value) {
      if (value === null || value === undefined || value === "") return null;
      const number = Number(value);
      return Number.isInteger(number) && number >= 1 && number <= 31 ? number : null;
    }

    function normalizeDateValue(value) {
      const candidate = String(value || "").trim();
      const match = /^(\d{4})-(\d{2})-(\d{2})$/.exec(candidate);
      if (!match) return "";
      const year = Number(match[1]);
      const month = Number(match[2]);
      const day = Number(match[3]);
      const date = new Date(Date.UTC(year, month - 1, day));
      const isValid = date.getUTCFullYear() === year &&
        date.getUTCMonth() === month - 1 &&
        date.getUTCDate() === day;
      return isValid ? candidate : "";
    }

    function dayFromDate(value) {
      const date = normalizeDateValue(value);
      return date ? Number(date.slice(8, 10)) : null;
    }

    function dateFromMonthAndDay(monthId, value) {
      const day = normalizeDebitDay(value);
      const match = /^(\d{4})-(\d{2})$/.exec(String(monthId || ""));
      if (!day || !match) return "";
      const year = Number(match[1]);
      const month = Number(match[2]);
      const lastDay = new Date(year, month, 0).getDate();
      return `${year}-${String(month).padStart(2, "0")}-${String(Math.min(day, lastDay)).padStart(2, "0")}`;
    }

    function normalizeDebitDate(item, monthId) {
      const debitDate = normalizeDateValue(item?.debitDate);
      if (debitDate) return debitDate;
      return dateFromMonthAndDay(monthId, item?.debitDay);
    }

    function normalizeBillingCycleMonths(value) {
      const number = Number(value);
      return [2, 3, 6, 12].includes(number) ? number : 1;
    }

    function normalizeBillingStartMonth(value, fallback = seed.activeMonth) {
      const candidate = String(value || fallback || seed.activeMonth);
      return /^\d{4}-\d{2}$/.test(candidate) ? candidate : seed.activeMonth;
    }

    function billingCycleLabel(value) {
      const cycle = normalizeBillingCycleMonths(value);
      return cycle === 1 ? "毎月" : `${cycle}ヶ月ごと`;
    }

    function formatDateLabel(value) {
      const date = normalizeDateValue(value);
      if (!date) return "";
      const [year, month, day] = date.split("-");
      return `${Number(year)}/${Number(month)}/${Number(day)}`;
    }

    function usagePeriodLabel(item) {
      const start = formatDateLabel(item.usagePeriodStart);
      const end = formatDateLabel(item.usagePeriodEnd);
      if (start && end) return `${start}〜${end}`;
      if (start) return `${start}〜`;
      if (end) return `〜${end}`;
      return "";
    }

    function isLikelyCardMethod(value) {
      return /カード|card/i.test(String(value || ""));
    }

    function formatMonthLabel(id) {
      const [year, month] = String(id).split("-");
      return year && month ? `${Number(year)}年${Number(month)}月` : "年月未設定";
    }

    function monthIndex(id) {
      const [year, month] = String(id).split("-").map(Number);
      return year * 12 + month - 1;
    }

    function isBillingDueInMonth(item, monthId) {
      const cycle = normalizeBillingCycleMonths(item.billingCycleMonths);
      if (cycle === 1) return true;
      const startMonth = normalizeBillingStartMonth(item.billingStartMonth, monthId);
      const diff = monthIndex(monthId) - monthIndex(startMonth);
      return diff >= 0 && diff % cycle === 0;
    }

    function copyItemForMonth(item, targetMonthId) {
      const cycle = normalizeBillingCycleMonths(item.billingCycleMonths);
      const debitDay = dayFromDate(item.debitDate) || normalizeDebitDay(item.debitDay);
      return {
        id: crypto.randomUUID(),
        seriesId: item.seriesId || item.id || crypto.randomUUID(),
        debitAccount: item.debitAccount || unassignedAccount,
        paymentType: normalizePaymentType(item.paymentType),
        paymentMethod: normalizePaymentType(item.paymentType) === "card" ? item.paymentMethod : "",
        content: item.content,
        amount: "",
        usedDate: "",
        debitDate: dateFromMonthAndDay(targetMonthId, debitDay),
        debitDay,
        billingCycleMonths: cycle,
        billingStartMonth: normalizeBillingStartMonth(item.billingStartMonth, targetMonthId),
        usagePeriodStart: "",
        usagePeriodEnd: "",
        note: "",
        paid: false
      };
    }

    function recurringTemplatesForMonth(targetMonthId) {
      const targetIndex = monthIndex(targetMonthId);
      const templates = new Map();
      state.months
        .slice()
        .sort((a, b) => a.id.localeCompare(b.id))
        .forEach(month => {
          if (monthIndex(month.id) > targetIndex) return;
          month.items.forEach(item => {
            const normalized = normalizeItem(item, month.id);
            if (normalizeBillingCycleMonths(normalized.billingCycleMonths) > 1) {
              templates.set(normalized.seriesId, normalized);
            }
          });
        });
      return Array.from(templates.values());
    }

    function itemsForNewMonth(targetMonthId) {
      const base = currentMonth();
      const items = [];
      const seenSeriesIds = new Set();

      base.items.forEach(item => {
        const normalized = normalizeItem(item, base.id);
        if (!isBillingDueInMonth(normalized, targetMonthId)) return;
        items.push(copyItemForMonth(normalized, targetMonthId));
        seenSeriesIds.add(normalized.seriesId);
      });

      recurringTemplatesForMonth(targetMonthId).forEach(item => {
        if (seenSeriesIds.has(item.seriesId)) return;
        if (!isBillingDueInMonth(item, targetMonthId)) return;
        items.push(copyItemForMonth(item, targetMonthId));
        seenSeriesIds.add(item.seriesId);
      });

      return items;
    }

    function replaceState(nextState, updatedAt) {
      const normalized = normalizeState(structuredClone(nextState));
      normalized.updatedAt = updatedAt || normalized.updatedAt;
      Object.keys(state).forEach(key => delete state[key]);
      Object.assign(state, normalized);
      localStorage.setItem(activeStorageKey, JSON.stringify(state));
    }

    function storageKeyForUser(user) {
      return `${storageKey}:user:${user.id}`;
    }

    function switchToUserStorage(user) {
      const userStorageKey = storageKeyForUser(user);
      if (activeStorageKey === userStorageKey) return;

      activeStorageKey = userStorageKey;
      const saved = readStoredState(userStorageKey);
      if (saved) {
        activeStateSource = "user";
        replaceState(saved, saved.updatedAt);
        return;
      }

      activeStateSource = "seed";
      replaceState(structuredClone(seed));
    }

    function switchToAnonymousStorage() {
      activeStorageKey = storageKey;
      activeStateSource = "anonymous";
      replaceState(readStoredState(storageKey) || structuredClone(seed));
    }

    function currentMonth() {
      return state.months.find(month => month.id === state.activeMonth) || state.months[0];
    }

    function render() {
      renderTabs();
      renderAccountSuggestions();
      renderEntries();
      renderSummary();
    }

    function renderTabs() {
      tabs.innerHTML = "";
      state.months.forEach(month => {
        const button = document.createElement("button");
        button.className = "tab";
        button.type = "button";
        button.textContent = month.label;
        button.setAttribute("aria-selected", String(month.id === state.activeMonth));
        button.addEventListener("click", () => {
          state.activeMonth = month.id;
          persist();
          render();
        });
        tabs.appendChild(button);
      });
    }

    function renderEntries() {
      const month = currentMonth();
      const query = searchInput.value.trim().toLowerCase();
      const items = month.items.filter(item => matchesQuery(item, query, month.id));
      const accountGroups = groupItemsByDebitAccount(items);

      monthTitle.textContent = month.label;
      list.innerHTML = "";

      if (!accountGroups.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "該当する明細がありません";
        list.appendChild(empty);
        return;
      }

      accountGroups.forEach(group => {
        const section = document.createElement("section");
        section.className = "account-group";
        const groupSum = group.items.reduce((acc, item) => acc + toNumber(item.amount), 0);
        const groupPaid = group.items.filter(item => item.paid).length;
        section.innerHTML = `
          <div class="account-head">
            <div class="account-title">
              <strong>${escapeHtml(group.account)}</strong>
              <span>支払い済み ${groupPaid} / ${group.items.length}</span>
            </div>
            <div class="account-total">${formatAmount(groupSum)}</div>
          </div>
          <div class="account-items"></div>
        `;

        const accountItems = section.querySelector(".account-items");
        group.items.forEach(item => accountItems.appendChild(renderEntryCard(item, month.id)));
        list.appendChild(section);
      });
    }

    function renderEntryCard(item, monthId) {
      const article = document.createElement("article");
      const paymentType = normalizePaymentType(item.paymentType);
      const paymentMethod = paymentType === "card" ? item.paymentMethod || "カード未設定" : "";
      const billingCycleMonths = normalizeBillingCycleMonths(item.billingCycleMonths);
      const debitDate = item.debitDate || dateFromMonthAndDay(monthId, item.debitDay);
      const usagePeriod = usagePeriodLabel(item);
      article.className = `entry${item.paid ? " done" : ""}`;
      article.innerHTML = `
          <div class="entry-main">
            <button class="check" type="button" title="支払い済み" aria-label="支払い済み">${item.paid ? "✓" : ""}</button>
            <div class="entry-title">
              <strong>${escapeHtml(item.content || "内容未設定")}</strong>
              <div class="entry-meta">
                <span class="payment-pill ${paymentType === "card" ? "card" : "direct"}">${paymentLabels[paymentType]}</span>
                ${paymentType === "card" ? `<span class="payment-method">${escapeHtml(paymentMethod)}</span>` : ""}
                ${debitDate ? `<span class="debit-date">引落 ${escapeHtml(formatDateLabel(debitDate))}</span>` : ""}
                ${item.usedDate ? `<span class="used-date">利用 ${escapeHtml(formatDateLabel(item.usedDate))}</span>` : ""}
                ${usagePeriod ? `<span class="usage-period">期間 ${escapeHtml(usagePeriod)}</span>` : ""}
                ${billingCycleMonths > 1 ? `<span class="billing-cycle">${billingCycleLabel(billingCycleMonths)}</span>` : ""}
              </div>
            </div>
            <button class="amount" type="button" title="詳細と削除" aria-label="詳細と削除">${formatAmount(item.amount)}</button>
          </div>
          <div class="entry-fields">
            <div class="field full">
              <label>内容</label>
              <input value="${escapeAttr(item.content)}" data-field="content">
            </div>
            <div class="field">
              <label>引落口座</label>
              <input list="accountSuggestions" value="${escapeAttr(item.debitAccount)}" data-field="debitAccount">
            </div>
            <div class="field">
              <label>支払い種別</label>
              <select data-field="paymentType">
                <option value="direct" ${paymentType === "direct" ? "selected" : ""}>直接引落</option>
                <option value="card" ${paymentType === "card" ? "selected" : ""}>カード払い</option>
              </select>
            </div>
            <div class="field" ${paymentType === "card" ? "" : "hidden"}>
              <label>カード名</label>
              <input value="${escapeAttr(item.paymentMethod)}" data-field="paymentMethod">
            </div>
            <div class="field">
              <label>金額</label>
              <input inputmode="numeric" value="${escapeAttr(item.amount)}" data-field="amount">
            </div>
            <div class="field">
              <label>利用日</label>
              <input type="date" value="${escapeAttr(item.usedDate)}" data-field="usedDate">
            </div>
            <div class="field">
              <label>引き落とし日</label>
              <input type="date" value="${escapeAttr(debitDate)}" data-field="debitDate">
            </div>
            <div class="field">
              <label>利用期間 開始</label>
              <input type="date" value="${escapeAttr(item.usagePeriodStart)}" data-field="usagePeriodStart">
            </div>
            <div class="field">
              <label>利用期間 終了</label>
              <input type="date" value="${escapeAttr(item.usagePeriodEnd)}" data-field="usagePeriodEnd">
            </div>
            <div class="field full">
              <label>備考</label>
              <textarea data-field="note">${escapeHtml(item.note)}</textarea>
            </div>
          </div>
        `;

      article.querySelector(".check").addEventListener("click", () => {
        item.paid = !item.paid;
        persist();
        render();
      });
      article.querySelector(".amount").addEventListener("click", () => openSheet(item.id));
      article.querySelectorAll("[data-field]").forEach(control => {
        control.addEventListener("change", () => {
          updateInlineField(item, control.dataset.field, control.value);
          persist();
          render();
        });
      });
      return article;
    }

    function updateInlineField(item, field, value) {
      const text = String(value || "").trim();
      if (field === "debitAccount") {
        item.debitAccount = text || unassignedAccount;
        return;
      }
      if (field === "paymentType") {
        item.paymentType = normalizePaymentType(text);
        if (item.paymentType !== "card") {
          item.paymentMethod = "";
        }
        return;
      }
      if (field === "paymentMethod") {
        item.paymentMethod = normalizePaymentType(item.paymentType) === "card" ? text : "";
        return;
      }
      if (field === "usedDate" || field === "usagePeriodStart" || field === "usagePeriodEnd") {
        item[field] = normalizeDateValue(text);
        return;
      }
      if (field === "debitDate") {
        item.debitDate = normalizeDateValue(text);
        item.debitDay = dayFromDate(item.debitDate);
        return;
      }
      item[field] = text;
    }

    function matchesQuery(item, query, monthId) {
      if (!query) return true;
      const paymentType = normalizePaymentType(item.paymentType);
      const debitDate = item.debitDate || dateFromMonthAndDay(monthId, item.debitDay);
      const usagePeriod = usagePeriodLabel(item);
      const haystack = [
        item.debitAccount,
        item.paymentMethod,
        paymentLabels[paymentType],
        debitDate,
        formatDateLabel(debitDate),
        item.usedDate,
        formatDateLabel(item.usedDate),
        item.usagePeriodStart,
        item.usagePeriodEnd,
        usagePeriod,
        normalizeBillingCycleMonths(item.billingCycleMonths) > 1 ? billingCycleLabel(item.billingCycleMonths) : "",
        item.content,
        item.note,
        item.amount,
        item.method
      ].join(" ").toLowerCase();
      return haystack.includes(query);
    }

    function groupItemsByDebitAccount(items) {
      const groups = new Map();
      items.forEach(item => {
        const account = item.debitAccount || unassignedAccount;
        if (!groups.has(account)) {
          groups.set(account, { account, items: [] });
        }
        groups.get(account).items.push(item);
      });
      return Array.from(groups.values());
    }

    function renderAccountSuggestions() {
      accountSuggestions.innerHTML = "";
      const accounts = new Set();
      state.months.forEach(month => {
        month.items.forEach(item => {
          const account = String(item.debitAccount || "").trim();
          if (account && account !== unassignedAccount) {
            accounts.add(account);
          }
        });
      });
      Array.from(accounts).sort((a, b) => a.localeCompare(b, "ja")).forEach(account => {
        accountSuggestions.appendChild(new Option(account));
      });
    }

    function renderSummary() {
      const month = currentMonth();
      const sum = month.items.reduce((acc, item) => acc + toNumber(item.amount), 0);
      const paid = month.items.filter(item => item.paid).length;
      totalAmount.textContent = formatAmount(sum);
      paidCount.textContent = `${paid} / ${month.items.length}`;
    }

    function openMonthSheet() {
      const currentYear = new Date().getFullYear();
      const [activeYear, activeMonth] = currentMonth().id.split("-").map(Number);
      yearInput.innerHTML = "";
      monthInput.innerHTML = "";
      for (let year = currentYear - 3; year <= currentYear + 7; year += 1) {
        yearInput.add(new Option(`${year}年`, String(year), false, year === activeYear));
      }
      for (let month = 1; month <= 12; month += 1) {
        monthInput.add(new Option(`${month}月`, String(month), false, month === activeMonth));
      }
      monthError.textContent = "";
      monthError.classList.remove("show");
      monthSheet.classList.add("open");
      scrim.classList.add("open");
      monthSheet.setAttribute("aria-hidden", "false");
    }

    function closeMonthSheet() {
      monthSheet.classList.remove("open");
      scrim.classList.remove("open");
      monthSheet.setAttribute("aria-hidden", "true");
      monthError.textContent = "";
      monthError.classList.remove("show");
    }

    function closeOpenSheet() {
      if (monthSheet.classList.contains("open")) {
        closeMonthSheet();
        return;
      }
      if (settingsSheet.classList.contains("open")) {
        closeSettingsSheet();
        return;
      }
      closeSheet();
    }

    function addSelectedMonth(event) {
      event.preventDefault();
      const year = Number(yearInput.value);
      const month = Number(monthInput.value);
      const id = `${year}-${String(month).padStart(2, "0")}`;
      const label = `${year}年${month}月`;
      if (state.months.some(existing => existing.id === id)) {
        monthError.textContent = `${label}は既に追加されています。`;
        monthError.classList.add("show");
        return;
      }
      state.months.push({
        id,
        label,
        items: itemsForNewMonth(id)
      });
      state.months.sort((a, b) => a.id.localeCompare(b.id));
      state.activeMonth = id;
      persist();
      closeMonthSheet();
      render();
    }

    function openSheet(id) {
      const item = id ? currentMonth().items.find(entry => entry.id === id) : null;
      editingId = id || null;
      sheetTitle.textContent = item ? "明細の詳細" : "明細を追加";
      deleteButton.style.display = item ? "block" : "none";
      clearEntryError();
      renderAccountSuggestions();
      debitAccountInput.value = item?.debitAccount || "";
      paymentTypeInput.value = normalizePaymentType(item?.paymentType);
      paymentMethodInput.value = item?.paymentMethod || "";
      contentInput.value = item?.content || "";
      amountInput.value = item?.amount || "";
      usedDateInput.value = item?.usedDate || "";
      debitDateInput.value = item?.debitDate || "";
      billingCycleInput.value = String(normalizeBillingCycleMonths(item?.billingCycleMonths));
      usagePeriodStartInput.value = item?.usagePeriodStart || "";
      usagePeriodEndInput.value = item?.usagePeriodEnd || "";
      noteInput.value = item?.note || "";
      syncPaymentMethodField();
      sheet.classList.add("open");
      scrim.classList.add("open");
      sheet.setAttribute("aria-hidden", "false");
      debitAccountInput.focus();
    }

    function openSettingsSheet() {
      settingsSheet.classList.add("open");
      scrim.classList.add("open");
      settingsSheet.setAttribute("aria-hidden", "false");
    }

    function closeSettingsSheet() {
      settingsSheet.classList.remove("open");
      scrim.classList.remove("open");
      settingsSheet.setAttribute("aria-hidden", "true");
    }

    function closeSheet() {
      sheet.classList.remove("open");
      scrim.classList.remove("open");
      sheet.setAttribute("aria-hidden", "true");
      form.reset();
      clearEntryError();
      editingId = null;
    }

    function saveEntry(event) {
      event.preventDefault();
      const month = currentMonth();
      const paymentType = normalizePaymentType(paymentTypeInput.value);
      const debitAccount = debitAccountInput.value.trim();
      const paymentMethod = paymentType === "card" ? paymentMethodInput.value.trim() : "";
      const content = contentInput.value.trim();
      const usedDate = normalizeDateValue(usedDateInput.value);
      const debitDate = normalizeDateValue(debitDateInput.value);
      const debitDay = dayFromDate(debitDate);
      const billingCycleMonths = normalizeBillingCycleMonths(billingCycleInput.value);
      const usagePeriodStart = normalizeDateValue(usagePeriodStartInput.value);
      const usagePeriodEnd = normalizeDateValue(usagePeriodEndInput.value);
      const existingItem = editingId ? month.items.find(entry => entry.id === editingId) : null;
      const existingCycle = normalizeBillingCycleMonths(existingItem?.billingCycleMonths);
      const billingStartMonth = existingItem && existingCycle === billingCycleMonths
        ? normalizeBillingStartMonth(existingItem.billingStartMonth, month.id)
        : month.id;

      if (!debitAccount) {
        showEntryError("引落口座を入力してください。");
        return;
      }

      if (!content) {
        showEntryError("内容を入力してください。");
        return;
      }

      if (paymentType === "card" && !paymentMethod) {
        showEntryError("カード払いの場合はカード名を入力してください。");
        return;
      }

      const invalidDateField = [
        [usedDateInput, "利用日"],
        [debitDateInput, "引き落とし日"],
        [usagePeriodStartInput, "利用期間 開始"],
        [usagePeriodEndInput, "利用期間 終了"]
      ].find(([input]) => input.value.trim() && !normalizeDateValue(input.value));

      if (invalidDateField) {
        showEntryError(`${invalidDateField[1]}はYYYY-MM-DD形式で入力してください。`);
        return;
      }

      const payload = {
        debitAccount,
        paymentType,
        paymentMethod,
        content,
        amount: amountInput.value.trim(),
        usedDate,
        debitDate,
        debitDay,
        billingCycleMonths,
        billingStartMonth,
        usagePeriodStart,
        usagePeriodEnd,
        note: noteInput.value.trim()
      };

      if (editingId) {
        const item = existingItem;
        Object.assign(item, { seriesId: item.seriesId || item.id }, payload);
      } else {
        const id = crypto.randomUUID();
        month.items.push({ id, seriesId: id, paid: false, ...payload });
      }
      persist();
      closeSheet();
      render();
    }

    function syncPaymentMethodField() {
      clearEntryError();
      const isCard = paymentTypeInput.value === "card";
      paymentMethodField.hidden = !isCard;
      paymentMethodInput.disabled = !isCard;
      paymentMethodInput.required = isCard;
      if (!isCard) {
        paymentMethodInput.value = "";
      }
    }

    function showEntryError(message) {
      entryError.textContent = message;
      entryError.classList.add("show");
    }

    function clearEntryError() {
      entryError.textContent = "";
      entryError.classList.remove("show");
    }

    function deleteEntry() {
      if (!editingId) return;
      const month = currentMonth();
      month.items = month.items.filter(item => item.id !== editingId);
      persist();
      closeSheet();
      render();
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = "payment-notes.json";
      anchor.click();
      URL.revokeObjectURL(url);
    }

    async function importJson(event) {
      const [file] = event.target.files;
      if (!file) return;
      try {
        const imported = JSON.parse(await file.text());
        if (!imported || !Array.isArray(imported.months) || !imported.months.length) {
          throw new Error("Invalid backup");
        }
        replaceState(imported, imported.updatedAt);
        persist({ keepUpdatedAt: true });
        closeSettingsSheet();
        render();
      } catch (error) {
        alert("バックアップファイルを読み込めませんでした。");
      } finally {
        event.target.value = "";
      }
    }

    async function setupCloudSync() {
      if (!isCloudSyncConfigured()) {
        renderIntegrationStatus();
        return;
      }

      if (!window.supabase?.createClient) {
        renderIntegrationStatus("Supabaseライブラリを読み込めませんでした。");
        return;
      }

      supabaseClient = window.supabase.createClient(
        config.supabaseUrl,
        config.supabasePublishableKey,
        {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true
          }
        }
      );

      supabaseClient.auth.onAuthStateChange(async (_event, session) => {
        currentSession = session;
        if (session?.user) {
          emailInput.value = session.user.email || "";
          switchToUserStorage(session.user);
          render();
          await syncState();
        } else {
          switchToAnonymousStorage();
          render();
        }
        renderIntegrationStatus();
      });

      try {
        const { data, error } = await supabaseClient.auth.getSession();
        if (error) throw error;
        currentSession = data.session;
        if (currentSession?.user) {
          emailInput.value = currentSession.user.email || "";
          switchToUserStorage(currentSession.user);
          render();
          await syncState();
        } else {
          switchToAnonymousStorage();
          render();
        }
      } catch (error) {
        handleSyncError(error);
      }
    }

    function isCloudSyncConfigured() {
      return Boolean(
        config.cloudSyncEnabled &&
        config.supabaseUrl &&
        config.supabasePublishableKey
      );
    }

    async function sendMagicLink() {
      if (!isCloudSyncConfigured() || !supabaseClient) return;

      const email = emailInput.value.trim();
      if (!email) {
        renderIntegrationStatus("メールアドレスを入力してください。");
        return;
      }

      if (!emailInput.checkValidity()) {
        renderIntegrationStatus("有効なメールアドレスを入力してください。");
        return;
      }

      try {
        renderIntegrationStatus("ログインリンクを送信中...");
        const { error } = await supabaseClient.auth.signInWithOtp({
          email,
          options: {
            emailRedirectTo: config.supabaseRedirectUrl || `${location.origin}${location.pathname}`
          }
        });
        if (error) throw error;
        renderIntegrationStatus("ログイン用メールを送信しました。リンクを開いてください。");
      } catch (error) {
        handleSyncError(error);
      }
    }

    async function signOut() {
      if (!supabaseClient) return;
      try {
        const { error } = await supabaseClient.auth.signOut();
        if (error) throw error;
        clearTimeout(syncTimer);
        currentSession = null;
        switchToAnonymousStorage();
        render();
        renderIntegrationStatus("ログアウトしました。");
      } catch (error) {
        handleSyncError(error);
      }
    }

    function scheduleCloudSync() {
      if (!currentSession || !supabaseClient) return;
      clearTimeout(syncTimer);
      syncTimer = setTimeout(() => {
        pushStateToCloud().catch(handleSyncError);
      }, 900);
    }

    async function syncState(options = {}) {
      if (!currentSession || !supabaseClient) {
        renderIntegrationStatus();
        return;
      }

      try {
        renderIntegrationStatus("同期中...");
        const { data, error } = await supabaseClient
          .from(syncTable)
          .select("state, updated_at")
          .eq("user_id", currentSession.user.id)
          .maybeSingle();

        if (error) throw error;

        const localUpdatedAt = new Date(state.updatedAt || 0).getTime();
        const remoteUpdatedAt = new Date(data?.updated_at || 0).getTime();

        const shouldUseRemote = data?.state &&
          !options.forcePush &&
          (activeStateSource === "seed" || remoteUpdatedAt > localUpdatedAt);

        if (shouldUseRemote) {
          activeStateSource = "remote";
          replaceState(data.state, data.updated_at);
          render();
          renderIntegrationStatus(`同期済み ${formatDateTime(data.updated_at)}`);
          return;
        }

        await pushStateToCloud();
      } catch (error) {
        handleSyncError(error);
      }
    }

    async function pushStateToCloud() {
      if (!currentSession || !supabaseClient) return;

      const updatedAt = new Date().toISOString();
      state.updatedAt = updatedAt;

      const { error } = await supabaseClient
        .from(syncTable)
        .upsert({
          user_id: currentSession.user.id,
          state: structuredClone(state),
          updated_at: updatedAt
        }, { onConflict: "user_id" });

      if (error) throw error;

      localStorage.setItem(activeStorageKey, JSON.stringify(state));
      activeStateSource = "user";
      renderIntegrationStatus(`同期済み ${formatDateTime(updatedAt)}`);
    }

    function handleSyncError(error) {
      console.warn(error);
      renderIntegrationStatus(`同期エラー: ${error.message || "不明なエラー"}`);
    }

    function renderIntegrationStatus(message) {
      const configured = isCloudSyncConfigured();
      const connected = Boolean(currentSession);
      const defaultMessage = configured
        ? connected
          ? `接続済み: ${currentSession.user.email || "ログイン中"}`
          : "未ログイン。メールリンクでログインできます。"
        : "Supabase設定が必要です。設定後もローカル保存は使えます。";

      document.getElementById("cloudSyncStatus").textContent = message || defaultMessage;

      emailInput.disabled = !configured || connected;
      signInButton.disabled = !configured || connected;
      signOutButton.disabled = !configured || !connected;
      syncNowButton.disabled = !configured || !connected;

      if (config.webAdsEnabled) {
        document.getElementById("adSlot").classList.add("ready");
      }
    }

    function formatDateTime(value) {
      if (!value) return "";
      return new Intl.DateTimeFormat("ja-JP", {
        month: "numeric",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(value));
    }

    function toNumber(value) {
      return Number(String(value).replace(/[^\d.-]/g, "")) || 0;
    }

    function formatAmount(value) {
      const number = toNumber(value);
      if (!number) return "¥0";
      return new Intl.NumberFormat("ja-JP", {
        style: "currency",
        currency: "JPY",
        maximumFractionDigits: 0
      }).format(number);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }
  </script>
</body>
