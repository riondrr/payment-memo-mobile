<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f8fcff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#080d12" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="引落メモ">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <title>口座別引落 月別管理</title>
  <style>
    :root {
      color-scheme: light dark;
      --paper: #fbfaf7;
      --ink: #24211c;
      --muted: #746d63;
      --line: #ded7cb;
      --panel: #fffdf9;
      --accent: #1976b9;
      --accent-soft: #dff2ff;
      --warn: #9b5d22;
      --rose: #b85454;
      --shadow: 0 20px 50px rgba(70, 55, 34, .12);
      --entry-label-height: 30px;
      --entry-control-height: 44px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% -10%, rgba(25, 118, 185, .13), transparent 32rem),
        linear-gradient(180deg, #f8fcff 0%, #ffffff 42%, #edf7fd 100%);
      color: var(--ink);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(100%, 460px);
      min-height: 100vh;
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 4px 2px 16px;
    }

    .title-block {
      min-width: 0;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      margin: 0 0 4px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .icon-button {
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--panel);
      color: var(--ink);
      box-shadow: 0 8px 22px rgba(75, 59, 35, .12);
      border: 1px solid rgba(98, 81, 50, .09);
      font-size: 21px;
    }

    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      min-width: 0;
      border: 1px solid var(--line);
      background: rgba(255, 253, 249, .84);
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 10px 24px rgba(65, 54, 38, .07);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .metric strong {
      display: block;
      font-size: 21px;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 5;
      margin: 0 -16px 12px;
      padding: 10px 16px;
      background: rgba(247, 243, 235, .88);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(173, 159, 136, .28);
    }

    .search-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: stretch;
      gap: 8px;
      margin-bottom: 12px;
    }

    .search-actions .search {
      min-width: 0;
    }

    .search-actions .soft-button {
      min-height: 44px;
      white-space: nowrap;
    }

    .search {
      display: grid;
      grid-template-columns: 28px 1fr;
      align-items: center;
      height: 44px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 0 12px;
      color: var(--muted);
    }

    .search input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      min-width: 0;
    }

    .month-navigation {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr) 92px;
      gap: 8px;
    }

    .month-navigation button,
    .month-navigation select {
      height: 40px;
      min-width: 0;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fffaf1;
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
    }

    .month-navigation select {
      width: 100%;
      padding: 0 34px 0 12px;
      text-align: center;
    }

    .month-navigation button:disabled {
      cursor: not-allowed;
      opacity: .4;
    }

    .primary-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .monthly-table-panel {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .monthly-table-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      padding: 8px 12px;
      font-weight: 800;
    }

    .monthly-table-chevron {
      color: var(--accent);
      font-size: 18px;
      transition: transform .18s ease;
    }

    .monthly-table-toggle[aria-expanded="true"] .monthly-table-chevron {
      transform: rotate(180deg);
    }

    .monthly-table-wrap {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .monthly-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .monthly-table th,
    .monthly-table td {
      border-bottom: 1px solid var(--line);
      padding: 9px 11px;
      text-align: left;
      overflow-wrap: anywhere;
    }

    .monthly-table th {
      color: var(--muted);
      font-size: 12px;
    }

    .monthly-table th:last-child,
    .monthly-table td:last-child {
      width: 38%;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .monthly-table tfoot td {
      border-bottom: 0;
      color: var(--accent);
      font-weight: 900;
    }

    .compact-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .soft-button {
      display: inline-grid;
      place-items: center;
      min-height: 40px;
      border: 1px solid #c9e7f8;
      border-radius: 8px;
      background: var(--accent-soft);
      color: #0b5f94;
      padding: 7px 11px;
      font-size: 13px;
      font-weight: 800;
    }

    .soft-button.active {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }

    .soft-button:disabled {
      cursor: not-allowed;
      opacity: .45;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .account-group {
      display: grid;
      gap: 8px;
    }

    .account-group + .account-group {
      margin-top: 12px;
    }

    .account-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 2px 5px;
      border-bottom: 1px solid rgba(173, 159, 136, .38);
    }

    .drag-handle {
      display: none;
      flex: 0 0 auto;
      width: 28px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      cursor: grab;
      font-size: 18px;
      line-height: 1;
      touch-action: none;
      user-select: none;
    }

    .list.reordering .drag-handle {
      display: grid;
      place-items: center;
    }

    .list.reordering .account-head {
      justify-content: flex-start;
    }

    .list.reordering .account-toggle {
      flex: 1 1 auto;
    }

    .list.reordering .entry-main {
      grid-template-columns: 28px 34px minmax(0, 1fr) auto;
    }

    .dragging {
      opacity: .55;
    }

    .drop-target {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .account-title {
      min-width: 0;
    }

    .account-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      padding: 0;
      background: transparent;
      color: inherit;
      text-align: left;
    }

    .account-chevron {
      flex: 0 0 auto;
      color: var(--accent);
      font-size: 18px;
      transition: transform .18s ease;
    }

    .account-toggle[aria-expanded="false"] .account-chevron {
      transform: rotate(-90deg);
    }

    .account-title strong {
      display: block;
      font-size: 17px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .account-title span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .account-total {
      flex: 0 0 auto;
      color: var(--accent);
      font-size: 18px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .account-items {
      display: grid;
      gap: 8px;
    }

    .account-items[hidden] {
      display: none;
    }

    .entry {
      border: 1px solid var(--line);
      background: rgba(255, 253, 249, .92);
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 10px 28px rgba(72, 57, 37, .08);
    }

    .entry-main {
      display: grid;
      grid-template-columns: 34px 1fr auto;
      gap: 10px;
      align-items: start;
    }

    .check {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid #b8ada0;
      background: #fff;
      color: white;
      display: grid;
      place-items: center;
      font-size: 16px;
      line-height: 1;
    }

    .entry.done .check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .entry-title {
      min-width: 0;
    }

    .entry-title strong {
      display: block;
      max-width: 100%;
      color: var(--ink);
      font-size: 16px;
      font-weight: 800;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .entry-title > span {
      display: inline-block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .entry-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .entry-edit {
      min-height: 24px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--accent);
      padding: 3px 9px;
      font-size: 12px;
      font-weight: 800;
    }

    .entry-actions {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .custom-cycle-control {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
    }

    .custom-cycle-control span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .payment-source,
    .billing-cycle {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
    }

    .payment-source.direct {
      background: #f0eadf;
      color: #685c4d;
    }

    .payment-source.card {
      background: var(--accent-soft);
      color: #0b5f94;
    }

    .billing-cycle {
      background: #eaf6ff;
      color: #246b96;
      border: 1px solid #c9e7f8;
      font-size: 11px;
    }

    .amount-input {
      width: 112px;
      min-width: 0;
      height: 36px;
      border: 1px solid #cce8f7;
      border-radius: 8px;
      background: #eef9ff;
      padding: 5px 10px;
      outline-color: var(--accent);
      text-align: right;
      color: var(--accent);
      font: inherit;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .entry-fields {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      column-gap: 8px;
      row-gap: 8px;
      margin-top: 12px;
    }

    .field {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .field[hidden] {
      display: none;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      min-width: 0;
      max-width: 100%;
      border: 1px solid #d8d0c3;
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 10px;
      outline-color: var(--accent);
    }

    .field input[type="date"] {
      min-width: 0;
      max-width: 100%;
    }

    .field textarea {
      min-height: 54px;
      resize: vertical;
    }

    .usage-period-control {
      display: grid;
      gap: 7px;
    }

    .usage-period-inputs {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 6px;
      align-items: center;
    }

    .usage-period-separator {
      color: var(--muted);
      font-weight: 800;
      text-align: center;
    }

    .inline-action {
      justify-self: start;
      min-height: 30px;
      border-radius: 999px;
      border: 1px solid #c9e7f8;
      background: #eef9ff;
      color: var(--accent);
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 800;
    }

    .inline-action:disabled {
      cursor: not-allowed;
      opacity: .45;
    }

    .entry-field-period {
      grid-column: 1 / -1;
    }

    .entry-field-label-row {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
    }

    .entry-fields .field > label,
    .entry-field-label-row {
      min-height: var(--entry-label-height);
      height: var(--entry-label-height);
    }

    .entry-fields .field > label {
      display: flex;
      align-items: center;
      white-space: nowrap;
    }

    .entry-field-label-row label {
      white-space: nowrap;
    }

    .entry-field-period .entry-field-label-row {
      height: auto;
      min-height: var(--entry-label-height);
      flex-wrap: wrap;
    }

    .entry-fields .field input,
    .entry-fields .field textarea {
      box-sizing: border-box;
      width: 100%;
      min-width: 0;
      max-width: 100%;
      height: var(--entry-control-height);
      min-height: var(--entry-control-height);
      padding: 0 10px;
      line-height: 1.2;
    }

    .entry-fields .field textarea {
      resize: none;
      overflow: hidden;
    }

    .entry-fields .field input[type="date"] {
      -webkit-appearance: none;
      appearance: none;
    }

    .entry-fields .usage-period-inputs {
      grid-template-columns: minmax(0, 1fr) 18px minmax(0, 1fr);
      gap: 7px;
      width: 100%;
      min-width: 0;
    }

    .entry-fields .usage-period-inputs input {
      height: var(--entry-control-height);
      min-height: var(--entry-control-height);
    }

    .entry-field-debit input,
    .entry-field-period input {
      text-align: right;
    }

    .entry-field-debit {
      grid-column: span 2;
    }

    .entry-field-debit > label {
      font-size: 11px;
    }

    .entry-field-note {
      grid-column: span 8;
    }

    .period-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .form-error {
      display: none;
      margin: 0;
      border: 1px solid #e6b7ad;
      border-radius: 8px;
      background: #fff1ed;
      color: #963e31;
      padding: 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .form-error.show {
      display: block;
    }

    .empty {
      border: 1px dashed #c8bdaa;
      border-radius: 8px;
      padding: 24px 14px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 253, 249, .56);
    }

    .sheet {
      position: fixed;
      inset: auto 0 0;
      z-index: 20;
      max-height: 92vh;
      max-height: min(92dvh, calc(100dvh - env(safe-area-inset-top)));
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      transform: translateY(110%);
      transition: transform .22s ease;
      padding: 14px 16px max(18px, env(safe-area-inset-bottom));
      background: #fffdf9;
      border-radius: 18px 18px 0 0;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
    }

    .sheet.open {
      transform: translateY(0);
    }

    .sheet form {
      width: min(100%, 440px);
      margin: 0 auto;
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .view-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 12px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
    }

    .view-toggle button {
      min-height: 38px;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-weight: 800;
    }

    .view-toggle button.active {
      background: var(--accent);
      color: white;
    }

    .calendar {
      display: grid;
      gap: 8px;
    }

    .calendar[hidden] {
      display: none;
    }

    .calendar-weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 4px;
    }

    .calendar-weekdays span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-align: center;
    }

    .calendar-day {
      min-width: 0;
      min-height: 84px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      padding: 5px;
      text-align: left;
      vertical-align: top;
    }

    .calendar-day.outside {
      visibility: hidden;
    }

    .calendar-day.today {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--accent);
    }

    .calendar-date-number {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      font-weight: 900;
    }

    .calendar-event {
      display: block;
      width: 100%;
      margin-top: 3px;
      overflow: hidden;
      border-radius: 5px;
      padding: 3px 4px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 9px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .calendar-event.paid {
      background: #e8f6ef;
      color: #27704d;
    }

    .trash-list,
    .day-detail-list {
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .trash-item,
    .day-detail-item {
      display: grid;
      gap: 8px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 11px;
    }

    .trash-item-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .trash-item button,
    .day-detail-item button {
      min-height: 38px;
      border-radius: 8px;
      font-weight: 800;
    }

    .sheet-head {
      position: sticky;
      top: -14px;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: -14px -2px 0;
      padding: 14px 2px 10px;
      background: #fffdf9;
    }

    .sheet h2 {
      margin: 0;
      font-size: 18px;
    }

    #settingsSheet {
      display: grid;
      gap: 12px;
    }

    .primary {
      height: 44px;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-weight: 800;
    }

    .danger {
      height: 40px;
      border-radius: 8px;
      background: #f7e6e2;
      color: var(--rose);
      font-weight: 800;
    }

    .secondary {
      height: 44px;
      border: 1px solid #cfc5b7;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-weight: 800;
    }

    .settings-link {
      display: grid;
      place-items: center;
      text-decoration: none;
    }

    .settings-trash-button {
      width: 100%;
    }

    .status {
      display: grid;
      gap: 5px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
    }

    .status strong {
      font-size: 14px;
    }

    .status span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .sync-panel {
      display: grid;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
    }

    .sync-actions {

    const seed = {

        {

            { id: "paypay-bank", seriesId: "paypay-bank", debitAccount: "PayPay銀行", paymentType: "direct", paymentMethod: "", content: "", amount: "", debitDay: null, billingCycleMonths: 1, billingStartMonth: "2026-05", note: "", paid: false },
            { id: "paypay-card", seriesId: "paypay-card", debitAccount: unassignedAccount, paymentType: "card", paymentMethod: "PayPayカード", content: "普段使い", amount: "", debitDay: null, billingCycleMonths: 1, billingStartMonth: "2026-05", note: "", paid: false },

            { id: "smbc", seriesId: "smbc", debitAccount: "SMBC", paymentType: "direct", paymentMethod: "", content: "", amount: "", debitDay: null, billingCycleMonths: 1, billingStartMonth: "2026-05", note: "", paid: false },

          ]
